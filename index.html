<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель мастера — CarService</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='10' fill='%23111'/><text x='32' y='46' font-family='Arial Black,sans-serif' font-size='40' font-weight='900' fill='%23d20124' text-anchor='middle'>М</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=PT+Sans:wght@400;700&display=swap');

:root {
  --red: #d20124;
  --dark: #111;
  --mid: #1e1e1e;
  --gray: #c2c3c5;
  --border: #ddd;
  --text: #333;
  --green: #1a8a3c;
  --blue: #1565c0;
  --orange: #e65100;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'PT Sans', sans-serif; background: #1a1a1a; color: var(--text); min-height: 100vh; }

/* ═══ HEADER ═══════════════════════════════════════════════ */
.master-header {
  background: #0a0a0a;
  border-bottom: 3px solid var(--red);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
}
.master-header .logo {
  font-family: 'Oswald', sans-serif;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.master-header .logo span { color: var(--red); }
.master-badge {
  background: var(--red);
  color: #fff;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.header-nav { display: flex; gap: 4px; }
.nav-btn {
  background: transparent;
  border: none;
  color: #888;
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 8px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s;
}
.nav-btn:hover { color: #ccc; }
.nav-btn.active { color: #fff; border-bottom-color: var(--red); }

/* ═══ LAYOUT ════════════════════════════════════════════════ */
.master-layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 56px); }

/* ═══ LEFT PANEL — CLIENT LIST ══════════════════════════════ */
.client-panel {
  background: #141414;
  border-right: 1px solid #2a2a2a;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.client-panel-header {
  padding: 14px 12px;
  border-bottom: 1px solid #2a2a2a;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.client-panel-title {
  font-family: 'Oswald', sans-serif;
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--red);
  display: inline-block;
  margin-bottom: 2px;
}
.search-wrap {
  position: relative;
}
.search-wrap .search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
}
.search-box {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 4px;
  padding: 8px 10px 8px 32px;
  color: #ddd;
  font-family: 'PT Sans', sans-serif;
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color .15s;
}
.search-box:focus { border-color: var(--red); background: #1e1e1e; }
.search-box::placeholder { color: #444; }
.btn-new-client {
  background: var(--red);
  color: #fff;
  border: none;
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 11px;
  cursor: pointer;
  width: 100%;
  transition: background .15s;
  border-radius: 2px;
  margin-top: 2px;
}
.btn-new-client:hover { background: #b50120; }

.client-list { overflow-y: auto; flex: 1; }
.client-item {
  padding: 14px 16px;
  border-bottom: 1px solid #1e1e1e;
  cursor: pointer;
  transition: background .15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
}
.client-item:hover { background: #1e1e1e; }
.client-item.active { background: #1e1e1e; border-left: 3px solid var(--red); }
.client-item.active { padding-left: 13px; }
.client-name {
  font-family: 'Oswald', sans-serif;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
}
.client-sub {
  color: #888;
  font-size: 12px;
  font-family: 'PT Sans', sans-serif;
}
.client-sum {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--red);
}
.client-sum.zero { color: #444; }

.client-empty {
  padding: 40px 20px;
  text-align: center;
  color: #444;
  font-size: 13px;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ═══ RIGHT PANEL — WORK AREA ═══════════════════════════════ */
.work-area {
  background: #1a1a1a;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.work-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: #333;
}
.work-empty svg { opacity: 0.15; }
.work-empty p {
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #444;
}

/* ═══ CLIENT CARD ═══════════════════════════════════════════ */
.client-card {
  background: #111;
  border-bottom: 1px solid #222;
  padding: 14px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px 20px;
  align-items: center;
}
.client-card-info { flex: 1; min-width: 0; display: flex; flex-wrap: wrap; align-items: center; gap: 8px 24px; }
.client-card-name {
  font-family: 'Oswald', sans-serif;
  color: #fff;
  font-size: 22px;
  font-weight: 600;
  white-space: nowrap;
}
.client-card-fields {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 20px;
  align-items: center;
}
.client-field {
  display: flex;
  align-items: center;
  gap: 5px;
}
.client-field label {
  font-size: 11px;
  color: #555;
  font-family: 'Oswald', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.client-field span {
  font-size: 14px;
  color: #ccc;
  font-family: 'PT Sans', sans-serif;
  white-space: nowrap;
}
.client-card-actions {
  display: flex;
  flex-direction: row;
  gap: 8px;
  flex-shrink: 0;
}
.btn-action {
  border: none;
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 8px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all .15s;
  white-space: nowrap;
}
.btn-pdf { background: var(--red); color: #fff; }
.btn-pdf:hover { background: #b50120; }
.btn-edit { background: #2a2a2a; color: #aaa; }
.btn-edit:hover { background: #333; color: #fff; }
.btn-delete { background: transparent; color: #555; border: 1px solid #333; }
.btn-delete:hover { border-color: var(--red); color: var(--red); }

/* ═══ TIER SELECTOR ══════════════════════════════════════════ */
.tier-row {
  background: #0d0d0d;
  display: flex;
  border-bottom: 1px solid #1a1a1a;
}
.tier-btn {
  flex: 1;
  padding: 10px 8px 8px;
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #444;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-right: 1px solid #1a1a1a;
  transition: all .2s;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.tier-btn:last-child { border-right: none; }
.tier-btn .tier-sub { font-size: 10px; font-family: 'PT Sans', sans-serif; color: #333; font-weight: 400; text-transform: none; letter-spacing: 0; }
.tier-btn:hover { color: #888; background: #111; }
.tier-btn:hover .tier-sub { color: #555; }
.tier-btn.active.tier-light { color: #66bb6a; border-bottom-color: #66bb6a; background: #0d1a0d; }
.tier-btn.active.tier-light .tier-sub { color: #388e3c; }
.tier-btn.active.tier-standard { color: #ffa726; border-bottom-color: #ffa726; background: #1a1200; }
.tier-btn.active.tier-standard .tier-sub { color: #f57c00; }
.tier-btn.active.tier-premium { color: var(--red); border-bottom-color: var(--red); background: #1a0000; }
.tier-btn.active.tier-premium .tier-sub { color: #c62828; }

/* ═══ CAR SELECTOR ══════════════════════════════════════════ */
.calc-wrapper { padding: 16px 24px; }

.section-title {
  font-family: 'Oswald', sans-serif;
  color: #888;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #2a2a2a;
}

/* ═══ QUICK SELECT ═══════════════════════════════════════════ */
.quick-select {
  display: flex;
  align-items: stretch;
  background: #d7d8d9;
  flex-wrap: wrap;
}
.qs-label {
  background: #d7d8d9;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #333;
  padding: 10px 14px;
  border-bottom: 3px solid var(--red);
  white-space: nowrap;
  display: flex;
  align-items: center;
}
.qs-btns { display: flex; flex-wrap: wrap; flex: 1; }
.qs-btn {
  background: #d7d8d9;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #333;
  padding: 10px 14px;
  border-right: 1px solid #fff;
  border-bottom: 3px solid var(--red);
  cursor: pointer;
  transition: background .15s;
}
.qs-btn:hover { background: #c2c3c5; }
.add-detail-btn {
  background: var(--red) !important;
  color: #fff !important;
  border-bottom-color: #900 !important;
  border-right: none !important;
  margin-left: auto;
  padding: 10px 18px !important;
  font-family: 'Oswald', sans-serif;
  font-size: 12px !important;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  border-bottom: 3px solid #900 !important;
}
.add-detail-btn:hover { background: #b50120 !important; }

/* ═══ PARTS TABLE ════════════════════════════════════════════ */
.tables-section { margin-top: 16px; }
.part-table {
  display: none;
  margin-bottom: 0;
  background: transparent;
}
.part-table.visible { display: block; }
.pt-inner { display: flex; flex-wrap: wrap; }
.pt-trash {
  width: 70px; min-width: 70px;
  border: 1px solid var(--border);
  padding: 8px; text-align: center; cursor: pointer;
}
.pt-trash .col-label {
  font-size: 11px; color: #888;
  border-bottom: 1px solid var(--border);
  padding: 4px 0; margin: -8px -8px 8px;
}
.pt-trash svg { fill: #ccc; transition: fill .2s; }
.pt-trash:hover svg { fill: var(--red); }
.mobile-part-name { display: none; }
.pt-name {
  width: 150px; min-width: 150px;
  border: 1px solid var(--border);
  padding: 8px; text-align: center;
}
.pt-name .col-label {
  font-size: 12px; color: #666;
  border-bottom: 1px solid var(--border);
  padding: 5px 0; margin: -8px -8px 8px;
  font-family: 'Oswald', sans-serif; font-weight: 500;
}
.pt-name .part-name-val { font-size: 16px; color: #333; margin-top: 6px; font-weight: 600; }
.pt-services { flex: 1; }
.pt-services-inner { display: flex; flex-wrap: wrap; }
.svc-col {
  flex: 1; min-width: 80px;
  border: 1px solid var(--border);
  padding: 8px; text-align: center;
}
.svc-col .col-label {
  font-size: 13px; color: #555;
  background: #f0f0f0;
  border-bottom: 1px solid var(--border);
  padding: 6px 3px; margin: -8px -8px 8px;
  white-space: nowrap;
  font-family: 'Oswald', sans-serif; font-weight: 500;
  letter-spacing: 0.2px;
}
.svc-total-col {
  flex: 1; min-width: 90px;
  border: 1px solid var(--border);
  padding: 8px; text-align: center;
}
.svc-total-col .col-label {
  font-size: 12px; color: #555;
  border-bottom: 1px solid var(--border);
  padding: 6px 0; margin: -8px -8px 8px;
  font-family: 'Oswald', sans-serif; font-weight: 500;
}
.svc-total-col .total-val {
  font-size: 19px; color: var(--red);
  font-family: 'Oswald', sans-serif;
  font-weight: 600; margin-top: 6px;
}

/* Toggle */
.toggle-wrap { display: flex; align-items: center; gap: 4px; justify-content: center; margin-top: 4px; }
.toggle-cb { position: absolute; opacity: 0; width: 0; height: 0; }
.toggle-label {
  position: relative; width: 42px; height: 21px;
  cursor: pointer; display: inline-block;
}
.toggle-label::before {
  content: ''; position: absolute; top: 0; left: 0;
  width: 42px; height: 21px; border-radius: 11px;
  background: #bbb; box-shadow: inset 0 2px 3px rgba(0,0,0,.2);
  transition: background .2s;
}
.toggle-label::after {
  content: ''; position: absolute; top: -1px; left: -1px;
  width: 23px; height: 23px; border-radius: 12px;
  background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.3);
  transition: left .2s;
}
.toggle-cb:checked + .toggle-label::before { background: var(--red); }
.toggle-cb:checked + .toggle-label::after { left: 20px; }
.price-label { font-size: 13px; color: #555; margin-top: 3px; }

/* ═══ PER-PART TIER ROW ══════════════════════════════════════ */
.pt-outer { background: #fff; margin-bottom: 10px; box-shadow: 0 0 9px #ccc; }
.pt-tier-row {
  display: flex;
  border-top: 1px solid #eee;
}
.pt-tier-btn {
  flex: 1;
  padding: 7px 6px;
  font-family: 'Oswald', sans-serif;
  cursor: pointer;
  text-align: center;
  background: #f5f5f5;
  border-right: 1px solid #e8e8e8;
  transition: all .15s;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.pt-tier-btn:last-child { border-right: none; }
.tier-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #bbb;
}
.tier-sub {
  font-size: 10px;
  font-family: 'PT Sans', sans-serif;
  color: #ccc;
}
.pt-tier-btn:hover { background: #ebebeb; }
.pt-tier-btn:hover .tier-label { color: #777; }
.pt-tier-btn:hover .tier-sub { color: #999; }
.pt-tier-btn.active.tier-light { background: #f1f8e9; border-top: 2px solid #66bb6a; }
.pt-tier-btn.active.tier-light .tier-label { color: #2e7d32; }
.pt-tier-btn.active.tier-light .tier-sub { color: #388e3c; }
.pt-tier-btn.active.tier-standard { background: #fff8e1; border-top: 2px solid #ffa726; }
.pt-tier-btn.active.tier-standard .tier-label { color: #e65100; }
.pt-tier-btn.active.tier-standard .tier-sub { color: #f57c00; }
.pt-tier-btn.active.tier-premium { background: #fff0f0; border-top: 2px solid var(--red); }
.pt-tier-btn.active.tier-premium .tier-label { color: var(--red); }
.pt-tier-btn.active.tier-premium .tier-sub { color: #c62828; }

/* ═══ SUMMARY BOX ════════════════════════════════════════════ */
.summary-box {
  background: #0d0d0d;
  border-top: 3px solid #222;
  margin-top: 20px;
}
.summary-header {
  padding: 14px 20px;
  border-bottom: 1px solid #222;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.summary-header h3 {
  font-family: 'Oswald', sans-serif;
  color: #888;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.summary-total-big {
  font-family: 'Oswald', sans-serif;
  color: var(--red);
  font-size: 28px;
  font-weight: 700;
}

.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 1px;
  background: #222;
}
.summary-cell {
  background: #111;
  padding: 14px 20px;
}
.summary-cell .s-label {
  font-family: 'Oswald', sans-serif;
  color: #666;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 5px;
}
.summary-cell .s-val {
  font-family: 'Oswald', sans-serif;
  color: #ddd;
  font-size: 20px;
  font-weight: 600;
}
.summary-cell .s-val.red { color: var(--red); }
.summary-cell .s-val.green { color: #4caf50; }
.summary-cell .s-val.orange { color: #ff9800; }
.summary-cell .s-note {
  font-size: 12px;
  color: #555;
  font-family: 'PT Sans', sans-serif;
  margin-top: 4px;
  line-height: 1.4;
}

/* ═══ COST BREAKDOWN ═════════════════════════════════════════ */
.cost-section {
  background: #0a0a0a;
  border-top: 1px solid #222;
  padding: 0;
}
.cost-header {
  padding: 12px 20px;
  border-bottom: 1px solid #1e1e1e;
  font-family: 'Oswald', sans-serif;
  color: #666;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.cost-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #222;
}
.cost-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: #1a1a1a;
}
.cost-cell {
  background: #0d0d0d;
  padding: 14px 16px;
  border-left: 3px solid transparent;
}
.cost-cell.repair { border-left-color: #ff9800; }
.cost-cell.paint { border-left-color: #2196f3; }
.cost-cell.other { border-left-color: #4caf50; }
.cost-cell .c-label {
  font-family: 'Oswald', sans-serif;
  color: #666;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.cost-cell .c-val {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: #ddd;
}
.cost-cell.repair .c-val { color: #ff9800; }
.cost-cell.paint .c-val { color: #2196f3; }
.cost-cell.other .c-val { color: #4caf50; }
.cost-cell .c-note {
  font-size: 12px;
  color: #555;
  margin-top: 5px;
  font-family: 'PT Sans', sans-serif;
  line-height: 1.4;
}
.cost-adj-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: #777;
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 7px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  border-radius: 2px;
  letter-spacing: 0.3px;
}
.cost-adj-btn:hover { background: #252525; color: #bbb; border-color: #444; }

/* Запчасти — поля ввода */
.sp-field { caret-color: #fff; }
.sp-field::placeholder { color: #3a3a3a; font-size: 13px; }
.sp-field:focus { background: rgba(255,255,255,0.03) !important; }
.cost-profit {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #1a1a1a;
}
.profit-label { font-family: 'Oswald', sans-serif; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
.profit-val { font-family: 'Oswald', sans-serif; font-size: 24px; font-weight: 700; color: #4caf50; }
.profit-val.loss { color: var(--red); }

/* Строка "Общая сумма затрат" */
/* Плейсхолдеры в таблице запчастей */
#sp-tbody input::placeholder { color: #555; }
#sp-tbody input { color: #ddd !important; }

.cost-total-row {
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;

/* ═══ MODAL ══════════════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #111;
  border: 1px solid #2a2a2a;
  border-top: 3px solid var(--red);
  width: 100%;
  max-width: 520px;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  overflow-x: hidden;
  box-sizing: border-box;
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; box-sizing: border-box; }
.form-group { display: flex; flex-direction: column; gap: 5px; width: 100%; }
.form-group label {
  font-family: 'Oswald', sans-serif;
  color: #888;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.form-group input, .form-group select, .form-group textarea {
  background: #1e1e1e;
  border: 1px solid #333;
  color: #ddd;
  font-family: 'PT Sans', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
  box-sizing: border-box;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--red); }
.form-group textarea { resize: none; min-height: 70px; }

/* Телефоны — всё в одну колонку */
@media (max-width: 768px) {
  .modal-overlay {
    padding: 0;
    align-items: flex-end;
  }
  .modal {
    max-width: 100%;
    width: 100%;
    max-height: 88vh;
    border-left: none;
    border-right: none;
    border-bottom: none;
    overflow-x: hidden;
  }
  .modal-header { padding: 14px 16px; }
  .modal-title { font-size: 16px; }
  .modal-body {
    padding: 12px 16px;
    gap: 10px;
    width: 100%;
    box-sizing: border-box;
  }
  /* ПРИНУДИТЕЛЬНО одна колонка */
  .form-row {
    display: flex !important;
    flex-direction: column !important;
    gap: 10px !important;
    width: 100%;
  }
  .form-row .form-group {
    width: 100% !important;
    min-width: 0 !important;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100% !important;
    min-width: 0 !important;
    padding: 11px 12px;
    font-size: 15px;
    box-sizing: border-box !important;
  }
  .form-group textarea { min-height: 60px; }
  .modal-footer {
    padding: 12px 16px;
    display: flex;
    gap: 10px;
  }
  .btn-primary, .btn-secondary {
    flex: 1;
    justify-content: center;
    padding: 13px;
    font-size: 14px;
  }
}

    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #444;
    transition: color .15s;
  }
  .mob-nav-btn.active .mob-nav-label { color: var(--red); }
  .mob-nav-btn.active::after {
    content: '';
    position: absolute;
    top: 0; left: 25%; right: 25%;
    height: 2px;
    background: var(--red);
  }

  /* Список клиентов с кнопкой сворачивания */
  .client-panel {
    max-height: 52vh;
    min-height: auto;
    display: flex;
    flex-direction: column;
  }
  .client-panel-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    height: 40px;
    background: #0a0a0a;
    border-top: 1px solid #1e1e1e;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #444;
    user-select: none;

  }
  .client-panel-toggle:active { background: #111; }
  .toggle-arrow { font-size: 10px; transition: transform .25s; }
  .client-panel.collapsed .client-panel-header { display: none; }
  .client-panel.collapsed .client-list { display: none; }
  .client-panel.collapsed .toggle-arrow { transform: rotate(180deg); }

@media (max-width: 600px) {
  .master-header { padding: 0 12px; }
  .calc-wrapper { padding: 10px 12px; }

  /* Карточки клиентов — лучше видны на мобильном */
  .client-item {
    padding: 12px 14px;
    padding-right: 80px; /* место под сумму */
  }
  .client-name { font-size: 15px; }
  .client-sub { font-size: 12px; color: #666; }
  .client-sum { font-size: 13px; right: 10px; }

  /* Карточка клиента — компактная на мобильном */
  .client-card { flex-direction: column; padding: 12px; gap: 10px; }
  .client-card-info { flex-direction: column; align-items: flex-start; gap: 4px; width: 100%; }
  .client-card-name { font-size: 18px; }
  .client-card-fields { gap: 4px 12px; }
  .client-field { flex-direction: column; align-items: flex-start; gap: 1px; }

  /* Уровни сервиса */
  .tier-row { font-size: 11px; }
  .tier-btn { padding: 10px 4px; font-size: 11px; }

  /* Машина на мобильном */
  .car-area-wrap { grid-template-columns: 1fr; max-height: unset; overflow: visible; }
  .car-svg-wrap { max-height: unset; }
  .car-svg-wrap svg { width: 100%; height: auto; max-height: unset; }
  .top-view-area {
    display: flex !important;
    justify-content: center;
    align-items: center;
    padding: 16px;
    background: #1a1a1a;
    max-height: unset;
  }

  /* Быстрый выбор */
  .quick-select { flex-wrap: wrap; }
  .qs-label { width: 100%; padding: 8px 12px; border-bottom: none; font-size: 10px; }
  .qs-btns { display: grid; grid-template-columns: repeat(3, 1fr); width: 100%; }
  .qs-btn { padding: 10px 4px; font-size: 10px; text-align: center; border-right: 1px solid #fff; }
  .add-detail-btn { width: 100% !important; text-align: center; margin-left: 0 !important; }

  /* Таблицы деталей */
  .cost-grid { grid-template-columns: 1fr; }
  .pt-inner { flex-direction: column; }
  .pt-trash { width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 2px solid var(--red); background: #f8f8f8; }
  .pt-trash .col-label { display: none; }
  .pt-trash svg { width: 20px; height: 20px; flex-shrink: 0; }
  .mobile-part-name { display: block; font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; color: #333; text-transform: uppercase; flex: 1; }
  .pt-name { display: none; }
  .pt-services { width: 100%; }
  .pt-services-inner { display: grid; grid-template-columns: 1fr 1fr; }
  .svc-col { min-width: unset; padding: 6px 4px; }
  .svc-col .col-label { font-size: 9px; white-space: normal; line-height: 1.2; }
  .svc-total-col { grid-column: 1/-1; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; border-top: 2px solid var(--border); background: #f8f8f8; }
  .svc-total-col .col-label { margin: 0; border: none; padding: 0; }
  .svc-total-col .total-val { margin: 0; }

  /* Итог и затраты */

  .summary-total-big { font-size: 22px; }
  .summary-grid { grid-template-columns: 1fr 1fr; }

  .summary-cell .s-val { font-size: 17px; }

  .cost-cell { padding: 12px 16px; }
  .cost-cell .c-label { font-size: 10px; }
  .cost-cell .c-val { font-size: 20px; }
  .cost-cell .c-note { font-size: 11px; }
  /* Плейсхолдеры в таблице запчастей */
#sp-tbody input::placeholder { color: #555; }
#sp-tbody input { color: #ddd !important; }

.cost-total-row { padding: 10px 14px; }
  .cost-total-label { font-size: 11px; }
  .cost-total-val { font-size: 16px; }
  .cost-profit { flex-direction: row; align-items: center; padding: 14px 16px; }

  .profit-val { font-size: 22px; }

@media print {

  body * { visibility: hidden !important; }

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const BASE_PRICES = {
  ppk: {s:2000,  rc:2000,  z:4000,  p1:5000, p2:0,    r2:10000, r1:5000 },
  lpk: {s:2000,  rc:2000,  z:4000,  p1:5000, p2:0,    r2:10000, r1:5000 },
  ppd: {s:3000,  rc:2000,  z:5000,  p1:5000, p2:7000, r2:15000, r1:10000},
  lpd: {s:3000,  rc:2000,  z:5000,  p1:5000, p2:7000, r2:15000, r1:10000},
  pzd: {s:3000,  rc:2000,  z:5000,  p1:5000, p2:7000, r2:15000, r1:10000},
  lzd: {s:3000,  rc:2000,  z:5000,  p1:5000, p2:7000, r2:15000, r1:10000},
  pzk: {s:20000, rc:4000,  z:20000, p1:6000, p2:0,    r2:15000, r1:10000},
  lzk: {s:20000, rc:4000,  z:20000, p1:6000, p2:0,    r2:15000, r1:10000},
  pb:  {s:2000,  rc:2000,  z:4000,  p1:5000, p2:0,    r2:10000, r1:5000 },
  zb:  {s:2000,  rc:2000,  z:4000,  p1:5000, p2:0,    r2:10000, r1:5000 },
  kry: {s:0,     rc:10000, z:40000, p1:8000, p2:0,    r2:30000, r1:15000},
  kap: {s:2000,  rc:2000,  z:4000,  p1:7000, p2:9000, r2:20000, r1:10000},
  bag: {s:3000,  rc:3000,  z:6000,  p1:7000, p2:9000, r2:20000, r1:10000},
  pp:  {s:3000,  rc:2000,  z:15000, p1:5000, p2:0,    r2:12000, r1:6000 },
  lp:  {s:3000,  rc:2000,  z:15000, p1:5000, p2:0,    r2:12000, r1:6000 },
};
const DETAIL_BASE = {s:4000, rc:5000, z:4000, p1:5000, p2:0, r2:15000, r1:7000};

// ─── НАСТРОЙКИ (загружаем из localStorage) ──────────────────
const SETTINGS_KEY = 'cs_settings';
const DEFAULT_SETTINGS = {
  colorSurcharge: 2000,
  paintCoeff2layer: 1.3,
  paintCost1layer: 3000,
  sparePartsPercent: 5,
  repairCostPerRepair: 4000,
  repairCostPerSU: 4000,
  repairCostPerRC: 4000,
  repairCostPerZ: 4000,
  prices: {},
  materialCosts: {} // per-part material costs: { partId: { r: N, s: N, rc: N, z: N } }
};

function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (!raw) return { ...DEFAULT_SETTINGS };
    return { ...DEFAULT_SETTINGS, ...JSON.parse(raw) };
  } catch (e) { return { ...DEFAULT_SETTINGS }; }
}

function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

function resetSettings() {
  localStorage.removeItem(SETTINGS_KEY);
}

const TIER_ADD   = { light: 0, standard: 1000, premium: 3000 };
const TIER_LABELS = { light: 'Лайт', standard: 'Стандарт', premium: 'Премиум' };

const PARTS = [
  { id:'ppk', name:'Правое переднее крыло', groups:['right','lobby','all'] },
  { id:'lpk', name:'Левое переднее крыло',  groups:['left','lobby','all']  },
  { id:'ppd', name:'Правая передняя дверь', groups:['right','lobby','all'] },
  { id:'lpd', name:'Левая передняя дверь',  groups:['left','lobby','all']  },
  { id:'pzd', name:'Правая задняя дверь',   groups:['right','rear','all']  },
  { id:'lzd', name:'Левая задняя дверь',    groups:['left','rear','all']   },
  { id:'pzk', name:'Правое заднее крыло',   groups:['right','rear','all']  },
  { id:'lzk', name:'Левое заднее крыло',    groups:['left','rear','all']   },
  { id:'pb',  name:'Передний бампер',       groups:['lobby','bumpers','all']},
  { id:'zb',  name:'Задний бампер',         groups:['rear','bumpers','all'] },
  { id:'kry', name:'Крыша',                 groups:['lobby','all']          },
  { id:'kap', name:'Капот',                 groups:['lobby','all']          },
  { id:'bag', name:'Крышка бага / Дверь бага', groups:['rear','all']       },
  { id:'pp',  name:'Правый порог',          groups:['right','all']          },
  { id:'lp',  name:'Левый порог',           groups:['left','all']           },
];

const SVC_KEYS   = ['s','rc','z','p1','p2','r2','r1'];
const SVC_LABELS = ['Снять/Установить','Разобр./Собрать','Замена','Окрас 1 ст.','Окрас 2 ст.','Рем >50%','Рем <50%'];

// Затраты мастера на ремонт одной детали
const REPAIR_COST_PER_PART = 4000;   // рем<50% или рем>50%
const PAINT_COST_1 = 3000;           // покраска 1 слой
const PAINT_COST_2 = 6000;           // покраска 2 слоя (Окрас 2 ст. = +3000)

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let clients = JSON.parse(localStorage.getItem('cs_clients') || '[]');
let activeClientId = null;
let editingClientId = null;

// Per-client calc state
function defaultCalcState() {
  const svcState = {};
  PARTS.forEach(p => { svcState[p.id] = {}; SVC_KEYS.forEach(k => svcState[p.id][k] = false); });
  return { tier: 'light', selected: [], svcState, details: [], detailUid: 0, extraRepair: 0, extraPaint: 0, spareParts: [], daysBody: 0, daysPaint: 0 };
}

function getClientState(id) {
  const c = clients.find(c => c.id === id);
  if (!c.calcState) c.calcState = defaultCalcState();
  return c.calcState;
}

function saveClients() {
  localStorage.setItem('cs_clients', JSON.stringify(clients));
}

function getPrices(partId, tier, calcState, colorSurcharge) {
  let bp;
  if (partId.startsWith('detail_')) {
    bp = (calcState && calcState._detailPrices && calcState._detailPrices[partId])
      ? calcState._detailPrices[partId]
      : DETAIL_BASE;
  } else {
    bp = BASE_PRICES[partId];
  }
  if (!bp) return {s:0,rc:0,z:0,p1:0,p2:0,r2:0,r1:0};
  const add = TIER_ADD[tier] || 0;
  const cSurcharge = colorSurcharge || 0;
  // Применяем пользовательские цены если они заданы
  const settings = loadSettings();
  const overrides = (settings.prices && settings.prices[partId]) || {};
  const base = { ...bp, ...overrides };
  return {
    s:  base.s,
    rc: base.rc > 0 ? base.rc + add : 0,
    z:  base.z  > 0 ? base.z  + add : 0,
    p1: base.p1 > 0 ? base.p1 + cSurcharge : 0,
    p2: base.p2 > 0 ? base.p2 + cSurcharge : 0,
    r2: base.r2,
    r1: base.r1,
  };
}

// ═══════════════════════════════════════════════════════════
// CLIENT LIST UI
// ═══════════════════════════════════════════════════════════
function renderClientList(filter = '', qName = '', qPhone = '', qCar = '') {
  const list = document.getElementById('client-list');
  const emptyMsg = document.getElementById('client-empty-msg');
  const filtered = clients.filter(c => {
    // Скрываем клиентов отправленных в архив или отработанных
    if (c.status === 'archive' || c.status === 'done') return false;
    // Общий поиск (для совместимости) или раздельный
    if (filter) {
      const q = filter.toLowerCase();
      return c.name.toLowerCase().includes(q) || (c.phone||'').includes(q) || (c.vin||'').toLowerCase().includes(q);
    }
    if (qName  && !c.name.toLowerCase().includes(qName))  return false;
    if (qPhone && !(c.phone||'').toLowerCase().includes(qPhone)) return false;
    if (qCar   && ![(c.car||''),(c.plate||''),(c.vin||'')].join(' ').toLowerCase().includes(qCar)) return false;
    return true;
  });

  if (filtered.length === 0) {
    emptyMsg.style.display = '';
  } else {
    emptyMsg.style.display = 'none';
  }

  // Remove old items
  list.querySelectorAll('.client-item').forEach(el => el.remove());

  filtered.forEach(c => {
    const total = calcClientTotal(c);
    const div = document.createElement('div');
    div.className = 'client-item' + (c.id === activeClientId ? ' active' : '');
    div.dataset.id = c.id;
    div.innerHTML = `
      <div class="client-name">${escHtml(c.name)} <span class="status-badge status-${c.status||'new'}">${statusLabel(c.status)}</span></div>
      <div class="client-sub">${escHtml(c.phone||'')}${c.vin?' · '+c.vin:''}</div>
      <div class="client-sub">${escHtml(c.car||'')}</div>
      <div class="client-sum ${total===0?'zero':''}">${total > 0 ? total.toLocaleString('ru')+' ₽' : '—'}</div>
    `;
    div.addEventListener('click', () => openClient(c.id));
    list.appendChild(div);
  });
}

function filterClients() {
  const qName  = (document.getElementById('client-search-name')?.value  || '').toLowerCase();
  const qPhone = (document.getElementById('client-search-phone')?.value || '').toLowerCase();
  const qCar   = (document.getElementById('client-search-car')?.value   || '').toLowerCase();
  renderClientList('', qName, qPhone, qCar);
}

function statusLabel(s) {
  if (s === 'calc') return 'Расчёт';
  if (s === 'done') return 'Готово';
  return 'Новый';
}

function calcClientTotal(c) {
  if (!c.calcState) return 0;
  const cs = c.calcState;
  const PREMIUM_COLORS = ['Ксералик', '3-х сл. перламутровая'];
  const _s = loadSettings();
  const colorSurcharge = PREMIUM_COLORS.includes(c.color||'')
    ? (_s.colorSurcharge ?? 2000) : 0;
  let total = 0;
  const allIds = [...cs.selected, ...(cs.details||[]).map(d => d.id)];
  allIds.forEach(id => {
    const tier = (cs._partTiers && cs._partTiers[id]) || cs.tier;
    const pr = getPrices(id, tier, cs, colorSurcharge); // surcharge included in getPrices
    const st = cs.svcState[id] || {};
    SVC_KEYS.forEach(k => {
      if (st[k]) total += pr[k];
    });
  });
  return total;
}

function openClient(id) {
  activeClientId = id;
  const c = clients.find(c => c.id === id);
  if (!c) return;
  if (!c.calcState) c.calcState = defaultCalcState();
  if (!c.calcState._detailPrices) c.calcState._detailPrices = {};
  // Устанавливаем colorSurcharge ДО рендера таблиц — чтобы цены отображались правильно
  const _PREMIUM_COLORS = ['Ксералик', '3-х сл. перламутровая'];
  const _st = loadSettings();
  c.calcState._colorSurcharge = _PREMIUM_COLORS.includes(c.color||'')
    ? (_st.colorSurcharge ?? 2000) : 0;
  renderClientList();

  document.getElementById('work-empty').style.display = 'none';
  const ws = document.getElementById('client-workspace');
  ws.style.display = 'flex';
  ws.innerHTML = '';

  // Build workspace
  ws.innerHTML = buildWorkspace(c);

  // Restore SVG selections
  const cs = c.calcState;
  cs.selected.forEach(id => {
    document.querySelectorAll(`.detal[data-name="${id}"]`).forEach(el => el.classList.add('on'));
  });

  // Restore table visibility
  PARTS.forEach(p => {
    const t = document.getElementById('table_' + p.id);
    if (t && cs.selected.includes(p.id)) { t.classList.add('visible'); }
  });
  (cs.details||[]).forEach(d => {
    const t = document.getElementById('table_' + d.id);
    if (t) t.classList.add('visible');
  });

  attachAllEvents(c);
  updateSummary(c);
}

function buildPartTableHTML(partId, name, cs) {
  const partTier = (cs._partTiers && cs._partTiers[partId]) || cs.tier;
  const pr = getPrices(partId, partTier, cs, cs._colorSurcharge || 0);
  return buildRowHTML(partId, name, pr, cs.svcState[partId] || {}, partTier);
}
function buildDetailTableHTML(detailId, name, cs) {
  const partTier = (cs._partTiers && cs._partTiers[detailId]) || cs.tier;
  const pr = getPrices(detailId, partTier, cs, cs._colorSurcharge || 0);
  return buildRowHTML(detailId, name, pr, cs.svcState[detailId] || {}, partTier);
}

function buildRowHTML(id, name, pr, state, currentTier) {
  const tier = currentTier || 'light';
  const isCustom = id.startsWith('detail_');

  const cols = SVC_KEYS.map((k, i) => {
    const val = pr[k];
    const disp = val > 0 ? val.toLocaleString('ru') + ' ₽' : '—';
    const disabled = val === 0 ? 'disabled' : '';
    // For custom details: price is an inline editable input
    const priceCell = isCustom
      ? `<input class="custom-price-input" data-id="${id}" data-key="${k}"
           type="text" inputmode="numeric" value="${val > 0 ? val : ''}"
           placeholder="—" ${val===0 ? '' : ''}
           style="width:100%;background:transparent;border:none;border-bottom:1px dashed #aaa;
                  outline:none;text-align:center;font-size:13px;color:#555;
                  font-family:'PT Sans',sans-serif;padding:1px 0;cursor:text;">`
      : `<div class="price-label">${disp}</div>`;
    return `<div class="svc-col">
      <div class="col-label">${SVC_LABELS[i]}</div>
      <div class="toggle-wrap">
        <input type="checkbox" class="toggle-cb" id="cb_${id}_${k}" ${state[k]?'checked':''} ${disabled}>
        <label class="toggle-label" for="cb_${id}_${k}" style="${val===0?'opacity:.3;pointer-events:none':''}"></label>
      </div>
      ${priceCell}
    </div>`;
  }).join('');

  const tierConfig = {
    light:    { label: 'Лайт',     sub: 'базовые цены' },
    standard: { label: 'Стандарт', sub: '+1\u00a0000\u00a0₽ к Р/С и Замене' },
    premium:  { label: 'Премиум',  sub: '+3\u00a0000\u00a0₽ к Р/С и Замене' },
  };
  const tierBtns = ['light','standard','premium'].map(t =>
    `<div class="pt-tier-btn tier-${t} ${tier===t?'active':''}" data-id="${id}" data-tier="${t}">
      <span class="tier-label">${tierConfig[t].label}</span>
      <span class="tier-sub">${tierConfig[t].sub}</span>
    </div>`
  ).join('');

  // For custom details: name is an editable input field
  const nameEl = isCustom
    ? `<input class="custom-name-input" id="name_${id}" type="text" value="${name}" maxlength="40"
        style="font-size:15px;font-weight:600;color:#333;font-family:'PT Sans',sans-serif;
               background:transparent;border:none;border-bottom:1px dashed #999;outline:none;
               width:100%;padding:2px 0;cursor:text;" placeholder="Название детали">`
    : `<div class="part-name-val">${name}</div>`;

  return `<div class="pt-outer">
    <div class="pt-inner">
      <div class="pt-trash" id="trash_${id}">
        <div class="col-label">-</div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12z"/>
          <path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
        </svg>
        <span class="mobile-part-name">${name}</span>
      </div>
      <div class="pt-name">
        <div class="col-label">элемент</div>
        ${nameEl}
      </div>
      <div class="pt-services">
        <div class="pt-services-inner">
          ${cols}
          <div class="svc-total-col">
            <div class="col-label">сумма</div>
            <div class="total-val" id="total_${id}">0 ₽</div>
          </div>
        </div>
      </div>
    </div>
    <div class="pt-tier-row" id="tier-row-${id}">${tierBtns}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function attachAllEvents(c) {
  const cs = c.calcState;

  // Per-part tier buttons — через делегирование (не теряются при перестройке DOM)
  // Глобальные tier-btn — тоже через делегирование ниже

  // SVG clicks
  document.querySelectorAll('.detal').forEach(el => {
    el.addEventListener('click', () => {
      const name = el.dataset.name;
      if (!name) return;
      const part = PARTS.find(p => p.id === name);
      if (!part) return;
      togglePart(c, part.id, part.name);
    });
  });

  // Quick select
  document.querySelectorAll('.qs-btn[data-group]').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.dataset.group;
      if (group === 'all') {
        const allIds = PARTS.map(p => p.id);
        const allSel = allIds.every(id => cs.selected.includes(id));
        if (allSel) allIds.forEach(id => deselectPart(c, id));
        else allIds.forEach(id => { if (!cs.selected.includes(id)) selectPart(c, id, PARTS.find(p=>p.id===id).name); });
      } else {
        const grp = PARTS.filter(p => p.groups.includes(group));
        const allSel = grp.every(p => cs.selected.includes(p.id));
        if (allSel) grp.forEach(p => deselectPart(c, p.id));
        else grp.forEach(p => { if (!cs.selected.includes(p.id)) selectPart(c, p.id, p.name); });
      }
    });
  });

  // Part checkboxes + tier buttons
  PARTS.forEach(p => {
    if (!cs.svcState[p.id]) cs.svcState[p.id] = {};
    attachPartRowEvents(c, p.id);
  });

  // Detail checkboxes + tier buttons
  (cs.details||[]).forEach(d => {
    attachPartRowEvents(c, d.id);
  });

  // Add detail button
  const addBtn = document.getElementById('add-detail-btn');
  if (addBtn) addBtn.addEventListener('click', () => addDetail(c));

  // Spare parts table
  initSpareParts(c);

  // Work days
  initWorkDays(c);
}

// ═══════════════════════════════════════════════════════════
// WORK DAYS
// ═══════════════════════════════════════════════════════════
function initWorkDays(c) {
  const cs = c.calcState;
  function updateDaysTotal() {
    const b = parseInt(document.getElementById('days-body')?.value || '0', 10) || 0;
    const p = parseInt(document.getElementById('days-paint')?.value || '0', 10) || 0;
    const tot = b + p;
    const el = document.getElementById('days-total');
    if (el) el.textContent = tot > 0 ? tot + ' дн.' : '—';
  }
  ['days-body', 'days-paint'].forEach(fid => {
    const inp = document.getElementById(fid);
    if (!inp) return;
    inp.addEventListener('input', () => {
      const val = parseInt(inp.value, 10);
      if (fid === 'days-body') cs.daysBody = isNaN(val) ? 0 : val;
      else cs.daysPaint = isNaN(val) ? 0 : val;
      updateDaysTotal();
      saveClients();
    });
  });
  updateDaysTotal();
}

// ═══════════════════════════════════════════════════════════
// SPARE PARTS TABLE
// ═══════════════════════════════════════════════════════════
function initSpareParts(c) {
  const cs = c.calcState;
  if (!cs.spareParts) cs.spareParts = [];

  const ROW_BASE  = 'display:grid;grid-template-columns:1.8fr 0.9fr 1.1fr 1.1fr 36px;gap:0;border-bottom:1px solid #252525;transition:background .1s;align-items:stretch;';
  const CELL_BORDER = 'border-right:1px solid #252525;';
  const INP_BASE  = 'background:transparent;border:none;outline:none;width:100%;box-sizing:border-box;transition:background .15s;';
  const INP_NAME  = INP_BASE + 'font-family:"PT Sans",sans-serif;font-size:15px;color:#ddd;padding:12px 10px 12px 14px;display:block;height:100%;';
  const INP_PRICE = INP_BASE + 'font-family:"Oswald",sans-serif;font-size:15px;font-weight:700;color:#ff9800;text-align:left;padding:12px 10px 12px 10px;display:block;width:100%;height:100%;';
  const INP_CAT   = INP_BASE + 'font-family:monospace;font-size:13px;color:#aaa;letter-spacing:0.5px;padding:12px 10px;display:block;height:100%;';

  function updateHeaderVisibility() {
    const hdr = document.getElementById('sp-table-header');
    const badge = document.getElementById('sp-count-badge');
    const hasRows = cs.spareParts.length > 0;
    if (hdr) hdr.style.display = hasRows ? '' : 'none';
    const filledCount = cs.spareParts.filter(r => r.name || r.price).length;
    if (badge) {
      if (filledCount > 0) { badge.textContent = filledCount + ' поз.'; badge.style.display = ''; }
      else badge.style.display = 'none';
    }
  }

  function renderRows() {
    const container = document.getElementById('sp-tbody');
    if (!container) return;
    container.innerHTML = cs.spareParts.map((row, i) => {
      const evenBg = i % 2 === 0 ? '#0e0e0e' : '#0b0b0b';
      return `<div class="sp-row" data-i="${i}" style="${ROW_BASE}background:${evenBg};">
        <div style="padding:0;${CELL_BORDER}display:flex;">
          <input class="sp-field" data-i="${i}" data-f="name" value="${escHtml(row.name||'')}"
            placeholder="Введите наименование..." style="${INP_NAME}">
        </div>
        <div style="padding:0;${CELL_BORDER}display:flex;">
          <input class="sp-field" data-i="${i}" data-f="price" value="${escHtml(row.price||'')}"
            placeholder="0" style="${INP_PRICE}" inputmode="numeric">
        </div>
        <div style="padding:0;${CELL_BORDER}display:flex;">
          <input class="sp-field" data-i="${i}" data-f="orig" value="${escHtml(row.orig||'')}"
            placeholder="Кат. № ориг." style="${INP_CAT}">
        </div>
        <div style="padding:0;${CELL_BORDER}display:flex;">
          <input class="sp-field" data-i="${i}" data-f="nonorig" value="${escHtml(row.nonorig||'')}"
            placeholder="Кат. № не ориг." style="${INP_CAT}">
        </div>
        <div style="display:flex;align-items:center;justify-content:center;">
          <button class="sp-del" data-i="${i}"
            style="background:none;border:none;color:#2a2a2a;font-size:15px;cursor:pointer;padding:8px;line-height:1;transition:color .15s;width:100%;height:100%;"
            onmouseenter="this.style.color='#d20124'" onmouseleave="this.style.color='#2a2a2a'">✕</button>
        </div>
      </div>`;
    }).join('');
    updateHeaderVisibility();
    bindRowEvents();
  }

  function bindRowEvents() {
    const container = document.getElementById('sp-tbody');
    if (!container) return;
    container.querySelectorAll('.sp-field').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = +inp.dataset.i;
        const f = inp.dataset.f;
        if (!cs.spareParts[i]) return;
        cs.spareParts[i][f] = inp.value;
        if (f === 'price') updateSummary(c);
        saveClients();
      });
      inp.addEventListener('focus', () => {
        const row = inp.closest('.sp-row');
        if (row) row.style.background = '#161616';
      });
      inp.addEventListener('blur', () => {
        const row = inp.closest('.sp-row');
        if (row) {
          const i = +row.dataset.i;
          row.style.background = i % 2 === 0 ? '#0d0d0d' : '#0a0a0a';
        }
      });
    });
    container.querySelectorAll('.sp-del').forEach(btn => {
      btn.addEventListener('click', () => {
        cs.spareParts.splice(+btn.dataset.i, 1);
        renderRows();
        updateSummary(c);
        saveClients();
      });
    });
  }

  const addBtn = document.getElementById('sp-add-btn');
  if (addBtn) {
    addBtn.onmouseenter = () => { addBtn.style.color='#aaa'; addBtn.style.background='rgba(255,255,255,0.03)'; };
    addBtn.onmouseleave = () => { addBtn.style.color='#444'; addBtn.style.background='transparent'; };
    addBtn.onclick = () => {
      cs.spareParts.push({ name:'', price:'', orig:'', nonorig:'' });
      renderRows();
      const container = document.getElementById('sp-tbody');
      if (container) {
        const all = container.querySelectorAll('.sp-field[data-f="name"]');
        if (all.length) all[all.length-1].focus();
      }
      saveClients();
    };
  }

  renderRows();
}

function attachDetailEvents(c, detailId) {
  const cs = c.calcState;
  if (!cs.svcState[detailId]) { cs.svcState[detailId] = {}; SVC_KEYS.forEach(k => cs.svcState[detailId][k] = false); }

  // Checkboxes
  SVC_KEYS.forEach(k => {
    const cb = document.getElementById('cb_' + detailId + '_' + k);
    if (cb) cb.addEventListener('change', () => {
      cs.svcState[detailId][k] = cb.checked;
      updateRowTotal(detailId, cs);
      updateSummary(c);
      saveClients();
    });
  });

  // Trash
  const trash = document.getElementById('trash_' + detailId);
  if (trash) trash.addEventListener('click', () => removeDetail(c, detailId));

  // Editable name input
  const nameInput = document.getElementById('name_' + detailId);
  if (nameInput) {
    nameInput.addEventListener('input', () => {
      const detail = (cs.details||[]).find(d => d.id === detailId);
      if (detail) {
        detail.name = nameInput.value || 'Деталь';
        // Also update mobile label
        const mob = document.querySelector('#table_' + detailId + ' .mobile-part-name');
        if (mob) mob.textContent = detail.name;
        saveClients();
      }
    });
  }

  // Inline price inputs — change/blur saves value immediately
  document.querySelectorAll(`#table_${detailId} .custom-price-input`).forEach(inp => {
    function applyPrice() {
      const key = inp.dataset.key;
      if (!cs._detailPrices) cs._detailPrices = {};
      if (!cs._detailPrices[detailId]) cs._detailPrices[detailId] = { ...DETAIL_BASE };
      const num = parseInt(inp.value.replace(/\D/g, ''), 10);
      cs._detailPrices[detailId][key] = isNaN(num) || num < 0 ? 0 : num;
      // Update checkbox disable state without full rebuild
      const val = cs._detailPrices[detailId][key];
      const cb = document.getElementById('cb_' + detailId + '_' + key);
      if (cb) {
        cb.disabled = val === 0;
        const lbl = document.querySelector(`label[for="cb_${detailId}_${key}"]`);
        if (lbl) lbl.style.opacity = val === 0 ? '0.3' : '1';
        if (val === 0) { cb.checked = false; cs.svcState[detailId][key] = false; }
      }
      updateRowTotal(detailId, cs);
      updateSummary(c);
      saveClients();
    }
    inp.addEventListener('change', applyPrice);
    inp.addEventListener('blur', applyPrice);
    // Select all on focus for easy overwriting
    inp.addEventListener('focus', () => inp.select());
  });
}

function togglePart(c, id, name) {
  const cs = c.calcState;
  if (cs.selected.includes(id)) deselectPart(c, id);
  else selectPart(c, id, name);
}

function selectPart(c, id, name) {
  const cs = c.calcState;
  if (cs.selected.includes(id)) return;
  cs.selected.push(id);
  if (!cs.svcState[id]) { cs.svcState[id] = {}; SVC_KEYS.forEach(k => cs.svcState[id][k] = false); }
  document.querySelectorAll(`.detal[data-name="${id}"]`).forEach(el => el.classList.add('on'));
  const t = document.getElementById('table_' + id);
  if (t) {
    t.classList.add('visible');
    t.innerHTML = buildPartTableHTML(id, name, cs);
    if (!cs.svcState[id]) cs.svcState[id] = {};
    SVC_KEYS.forEach(k => {
      const cb = document.getElementById('cb_' + id + '_' + k);
      if (cb) cb.addEventListener('change', () => {
        cs.svcState[id][k] = cb.checked;
        updateRowTotal(id, cs);
        updateSummary(c);
        saveClients();
      });
    });
    const trash = document.getElementById('trash_' + id);
    if (trash) trash.addEventListener('click', () => deselectPart(c, id));
    updateRowTotal(id, cs);
  }
  updateSummary(c);
  saveClients();
}

function deselectPart(c, id) {
  const cs = c.calcState;
  cs.selected = cs.selected.filter(x => x !== id);
  document.querySelectorAll(`.detal[data-name="${id}"]`).forEach(el => {
    el.classList.remove('on');
    el.style.setProperty('fill','#fff','important');
    el.style.setProperty('fill-opacity','0.5','important');
    setTimeout(() => { el.style.removeProperty('fill'); el.style.removeProperty('fill-opacity'); }, 50);
  });
  const t = document.getElementById('table_' + id);
  if (t) t.classList.remove('visible');
  if (cs.svcState[id]) SVC_KEYS.forEach(k => cs.svcState[id][k] = false);
  updateSummary(c);
  saveClients();
}

function addDetail(c) {
  const cs = c.calcState;
  if (!cs.details) cs.details = [];
  if (!cs._detailPrices) cs._detailPrices = {};
  cs.detailUid = (cs.detailUid || 0) + 1;
  const uid = cs.detailUid;
  const id = 'detail_' + uid;
  const num = cs.details.length + 1;
  const name = 'Деталь' + (num > 1 ? ' ' + num : '');
  cs.details.push({ id, name });
  cs._detailPrices[id] = { ...DETAIL_BASE };
  cs.svcState[id] = {}; SVC_KEYS.forEach(k => cs.svcState[id][k] = false);

  const sec = document.getElementById('tables-section');
  const div = document.createElement('div');
  div.className = 'part-table visible';
  div.id = 'table_' + id;
  const pr = getPrices(id, cs.tier, cs);
  div.innerHTML = buildRowHTML(id, name, pr, cs.svcState[id]);
  sec.appendChild(div);
  attachDetailEvents(c, id);
  updateSummary(c);
  saveClients();
}

function removeDetail(c, id) {
  const cs = c.calcState;
  cs.details = (cs.details||[]).filter(d => d.id !== id);
  delete cs.svcState[id];
  if (cs._detailPrices) delete cs._detailPrices[id];
  const div = document.getElementById('table_' + id);
  if (div) div.remove();
  updateSummary(c);
  saveClients();
}

function attachPartRowEvents(c, partId) {
  const cs = c.calcState;
  SVC_KEYS.forEach(k => {
    const cb = document.getElementById('cb_' + partId + '_' + k);
    if (cb) cb.addEventListener('change', () => {
      if (!cs.svcState[partId]) cs.svcState[partId] = {};
      cs.svcState[partId][k] = cb.checked;
      const tier = (cs._partTiers && cs._partTiers[partId]) || cs.tier;
      updateRowTotal(partId, cs, tier);
      updateSummary(c);
      saveClients();
    });
  });
  const trash = document.getElementById('trash_' + partId);
  if (trash) {
    const part = PARTS.find(p => p.id === partId);
    if (part) trash.addEventListener('click', () => deselectPart(c, partId));
    else trash.addEventListener('click', () => removeDetailById(c, partId));
  }
  // Per-part tier buttons навешиваются глобальным делегированным обработчиком
}

function removeDetailById(c, detailId) {
  const cs = c.calcState;
  cs.details = (cs.details||[]).filter(d => d.id !== detailId);
  if (cs._detailPrices) delete cs._detailPrices[detailId];
  if (cs.svcState) delete cs.svcState[detailId];
  const t = document.getElementById('table_' + detailId);
  if (t) t.remove();
  updateSummary(c);
  saveClients();
}

function rebuildAllTables(c) {
  const cs = c.calcState;
  PARTS.forEach(p => {
    const t = document.getElementById('table_' + p.id);
    if (t && cs.selected.includes(p.id)) {
      t.innerHTML = buildPartTableHTML(p.id, p.name, cs);
      attachPartRowEvents(c, p.id);
      const tier = (cs._partTiers && cs._partTiers[p.id]) || cs.tier;
      updateRowTotal(p.id, cs, tier);
    }
  });
  (cs.details||[]).forEach(d => {
    const t = document.getElementById('table_' + d.id);
    if (t) {
      t.innerHTML = buildDetailTableHTML(d.id, d.name, cs);
      attachPartRowEvents(c, d.id);
      const tier = (cs._partTiers && cs._partTiers[d.id]) || cs.tier;
      updateRowTotal(d.id, cs, tier);
    }
  });
}

function updateRowTotal(partId, cs, overrideTier) {
  const tier = overrideTier || (cs._partTiers && cs._partTiers[partId]) || cs.tier;
  const pr = getPrices(partId, tier, cs, cs._colorSurcharge || 0);
  let sum = 0;
  SVC_KEYS.forEach(k => { if (cs.svcState[partId] && cs.svcState[partId][k]) sum += pr[k]; });
  const el = document.getElementById('total_' + partId);
  if (el) el.textContent = sum.toLocaleString('ru') + ' ₽';
}

// ═══════════════════════════════════════════════════════════
// SUMMARY & COST CALCULATION
// ═══════════════════════════════════════════════════════════
function updateSummary(c) {
  const cs = c.calcState;
  let total = 0, su = 0, z = 0, rem = 0, paint = 0;
  let repairParts = 0, paintCost = 0, otherCost = 0;
  let detailCount = 0, paintUnits = 0;

  // Надбавка за тип покрытия — берём из настроек
  const PREMIUM_COLORS = ['Ксералик', '3-х сл. перламутровая'];
  const _settings = loadSettings();
  const colorSurcharge = PREMIUM_COLORS.includes(c.color||'')
    ? (_settings.colorSurcharge ?? 2000) : 0;
  // Сохраняем в cs чтобы buildPartTableHTML мог использовать при рендере
  cs._colorSurcharge = colorSurcharge;

  const allIds = [...cs.selected, ...(cs.details||[]).map(d => d.id)];
  allIds.forEach(id => {
    const partTier = (cs._partTiers && cs._partTiers[id]) || cs.tier;
    const pr = getPrices(id, partTier, cs, colorSurcharge);
    const st = cs.svcState[id] || {};
    const hasPaint = st.p1 || st.p2;
    SVC_KEYS.forEach(k => {
      if (st[k]) {
        const v = pr[k]; // colorSurcharge уже включён в getPrices
        total += v;
        if (k === 's')  { su += v; otherCost += v; }
        if (k === 'rc') { otherCost += v; }
        if (k === 'z')  { z += v; otherCost += v; }
        if (k === 'p1') paint += v;
        if (k === 'p2') paint += v;
        if (k === 'r1' || k === 'r2') rem += v;
      }
    });
    // Count repair ops for cost
    if (st.r1 || st.r2) repairParts++;
    // Count paint ops for cost — kap/kry/bag стоят 4500, остальные 3000; p2 = p1*1.3
    const PAINT_LARGE = ['kap', 'kry', 'bag'];
    const _pc1 = _settings.paintCost1layer ?? PAINT_COST_1;
    const paintBase = PAINT_LARGE.includes(id) ? Math.round(_pc1 * 1.5) : _pc1;
    const paintCoeff = _settings.paintCoeff2layer || 1.3;
    if (st.p2) { paintCost += Math.round(paintBase * paintCoeff); paintUnits += paintCoeff; }
    else if (st.p1) { paintCost += paintBase; paintUnits += 1.0; }
    detailCount++;
  });

  const extraRepair = cs.extraRepair || 0;
  const extraPaint  = cs.extraPaint  || 0;
  const cRep = _settings.repairCostPerRepair ?? 4000;
  const cSU  = _settings.repairCostPerSU ?? 0;
  const cRC  = _settings.repairCostPerRC ?? 0;
  const cZ   = _settings.repairCostPerZ  ?? 0;
  const matCosts = _settings.materialCosts || {};
  let repairMaterialCost = 0;
  allIds.forEach(id => {
    const st = cs.svcState[id] || {};
    const mc = matCosts[id] || {};
    // Ремонт
    if (st.r1 || st.r2) repairMaterialCost += (mc.r !== undefined ? mc.r : cRep);
    // С/У
    if (st.s)  repairMaterialCost += (mc.s !== undefined ? mc.s : cSU);
    // Р/С
    if (st.rc) repairMaterialCost += (mc.rc !== undefined ? mc.rc : cRC);
    // Замена
    if (st.z)  repairMaterialCost += (mc.z !== undefined ? mc.z : cZ);
  });
  const totalRepairCost = repairMaterialCost + extraRepair;
  const totalPaintCost  = paintCost + extraPaint;
  // grandTotal вычислим позже — после подсчёта запчастей

  // Update DOM
  const sel = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  sel('sum-total', total.toLocaleString('ru') + ' ₽');
  // Show/hide premium color badge
  const colorBadge = document.getElementById('color-surcharge-badge');
  if (colorBadge) {
    if (colorSurcharge > 0) {
      colorBadge.textContent = c.color + ' +' + colorSurcharge.toLocaleString('ru') + ' ₽/эл.';
      colorBadge.style.display = '';
    } else {
      colorBadge.style.display = 'none';
    }
  }
  sel('sum-count', allIds.length);
  sel('sum-su', su.toLocaleString('ru') + ' ₽');
  sel('sum-z', z.toLocaleString('ru') + ' ₽');
  sel('sum-rem', rem.toLocaleString('ru') + ' ₽');
  sel('sum-paint', paint.toLocaleString('ru') + ' ₽');
  sel('cost-repair', totalRepairCost.toLocaleString('ru') + ' ₽');
  sel('cost-paint', totalPaintCost.toLocaleString('ru') + ' ₽');

  // Счётчик единиц краски (1.0 за однослойную, 1.3 за двухслойную)
  const paintCountEl = document.getElementById('paint-units');
  if (paintCountEl) {
    if (paintUnits > 0) {
      // Форматируем: целое число без .0, с одним знаком если дробное
      const puStr = paintUnits % 1 === 0
        ? paintUnits.toFixed(0)
        : paintUnits.toFixed(1).replace('.', ',');
      paintCountEl.textContent = puStr + ' ед.';
      paintCountEl.style.display = '';
    } else {
      paintCountEl.style.display = 'none';
    }
  }

  // Прочие затраты = 5% от суммы запчастей (пустые строки не учитываются)
  const spSum = ((c.calcState.spareParts)||[]).reduce((acc, row) => {
    // Пропускаем строки без названия и без цены
    if (!row.name && !row.price) return acc;
    const v = parseInt(String(row.price||'').replace(/\D/g,''), 10);
    return acc + (isNaN(v) ? 0 : v);
  }, 0);
  const _spPct = (_settings.sparePartsPercent ?? 5) / 100;
  const otherRounded = Math.round(spSum * _spPct);
  const spTotalEl = document.getElementById('sp-total');
  if (spTotalEl) spTotalEl.textContent = spSum > 0 ? spSum.toLocaleString('ru') + ' ₽' : '—';
  // update badge
  const spBadge = document.getElementById('sp-count-badge');
  const spCount = (cs.spareParts||[]).filter(r => r.name || r.price).length;
  if (spBadge) {
    if (spCount > 0) { spBadge.textContent = spCount + ' поз.'; spBadge.style.display = ''; }
    else spBadge.style.display = 'none';
  }
  const spHdr = document.getElementById('sp-table-header');
  if (spHdr) spHdr.style.display = (cs.spareParts||[]).length > 0 ? '' : 'none';
  sel('cost-other', otherRounded.toLocaleString('ru') + ' ₽');
  const _pct = _settings.sparePartsPercent ?? 5;
  const noteEl = document.getElementById('cost-other-note');
  if (noteEl) noteEl.textContent = spSum > 0
    ? `${_pct}% от ${spSum.toLocaleString('ru')} ₽`
    : `${_pct}% от суммы запчастей`;

  // Общая сумма затрат = расходники + краска + прочие
  const totalCosts = totalRepairCost + totalPaintCost + otherRounded;
  sel('cost-total', totalCosts.toLocaleString('ru') + ' ₽');

  // Итог с затратами = Итог расчёта + Сумма запчастей + Общая сумма затрат
  const grandTotal = total + spSum + totalCosts;

  // Показываем корректировки
  const extraRepairEl = document.getElementById('extra-repair');
  if (extraRepairEl) {
    extraRepairEl.textContent = (extraRepair >= 0 ? '+' : '') + extraRepair.toLocaleString('ru') + ' ₽';
    extraRepairEl.style.color = extraRepair > 0 ? '#ff9800' : extraRepair < 0 ? '#4caf50' : '#555';
  }
  const extraPaintEl = document.getElementById('extra-paint');
  if (extraPaintEl) {
    extraPaintEl.textContent = (extraPaint >= 0 ? '+' : '') + extraPaint.toLocaleString('ru') + ' ₽';
    extraPaintEl.style.color = extraPaint > 0 ? '#2196f3' : extraPaint < 0 ? '#4caf50' : '#555';
  }

  const profitEl = document.getElementById('cost-profit');
  if (profitEl) {
    profitEl.textContent = grandTotal.toLocaleString('ru') + ' ₽';
    // Color: green if positive, red if zero/negative
    profitEl.style.color = grandTotal > 0 ? '#4caf50' : '#d20124';
  }

  // Сохраняем полную итоговую сумму в calcState для архивирования
  cs._grandTotal = grandTotal;

  // Update client status
  if (allIds.length > 0) c.status = 'calc';
  renderClientList();
  saveClients();
}

// MODAL: NEW / EDIT CLIENT

function openNewClientModal() {
  editingClientId = null;
  document.getElementById('modal-title').textContent = 'Новый клиент';
  ['name','phone','vin','plate','car','color','note'].forEach(f => {
    const el = document.getElementById('f-' + f);
    if (el) el.value = '';
  });
  document.getElementById('client-modal').classList.add('open');
}

function openEditClientModal(id) {
  const c = clients.find(c => c.id === id);
  if (!c) return;
  editingClientId = id;
  document.getElementById('modal-title').textContent = 'Редактировать клиента';
  document.getElementById('f-name').value = c.name || '';
  document.getElementById('f-phone').value = c.phone || '';
  document.getElementById('f-vin').value = c.vin || '';
  document.getElementById('f-plate').value = c.plate || '';
  document.getElementById('f-car').value = c.car || '';
  document.getElementById('f-color').value = c.color || '';
  document.getElementById('f-note').value = c.note || '';
  document.getElementById('client-modal').classList.add('open');
}

function saveClient() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name) { alert('Введите имя клиента'); return; }

  if (editingClientId) {
    const c = clients.find(c => c.id === editingClientId);
    if (c) {
      c.name = name; c.phone = phone;
      c.vin = document.getElementById('f-vin').value.trim().toUpperCase();
      c.plate = document.getElementById('f-plate').value.trim().toUpperCase();
      c.car = document.getElementById('f-car').value.trim();
      c.color = document.getElementById('f-color').value.trim();
      c.note = document.getElementById('f-note').value.trim();
    }
  } else {
    const newClient = {
      id: 'c_' + Date.now(),
      name, phone,
      vin: document.getElementById('f-vin').value.trim().toUpperCase(),
      plate: document.getElementById('f-plate').value.trim().toUpperCase(),
      car: document.getElementById('f-car').value.trim(),
      color: document.getElementById('f-color').value.trim(),
      note: document.getElementById('f-note').value.trim(),
      status: 'new',
      createdAt: new Date().toISOString(),
      calcState: defaultCalcState(),
    };
    clients.unshift(newClient);
    activeClientId = newClient.id;
  }

  saveClients();
  closeModal('client-modal');
  renderClientList();

  if (editingClientId) {
    openClient(editingClientId);
  } else {
    openClient(activeClientId);
  }
}

function deleteClient(id) {
  if (!confirm('Удалить клиента? Все расчёты будут потеряны.')) return;
  clients = clients.filter(c => c.id !== id);
  saveClients();
  if (activeClientId === id) {
    activeClientId = null;
    document.getElementById('work-empty').style.display = 'flex';
    document.getElementById('client-workspace').style.display = 'none';
    document.getElementById('client-workspace').innerHTML = '';
  }
  renderClientList();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay click
document.getElementById('client-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('client-modal');
});

function printPDF() {
  const c = clients.find(c => c.id === activeClientId);
  if (!c) return;
  const cs = c.calcState;
  const allIds = [...(cs.selected||[]), ...(cs.details||[]).map(d => d.id)];
  const date = new Date().toLocaleDateString('ru-RU');
  const shortLabels = ['С/У','Разборка','Замена','Окрас 1','Окрас 2','Рем >50%','Рем <50%'];
  const _settings = loadSettings();

  // ── Строки деталей ──────────────────────────────────────────
  let rows = '';
  let hasRows = false;
  const PREMIUM_COLORS_PDF = ['Ксералик', '3-х сл. перламутровая'];
  const colorSurchargePDF = PREMIUM_COLORS_PDF.includes(c.color||'') ? (_settings.colorSurcharge ?? 2000) : 0;

  allIds.forEach(id => {
    const part = PARTS.find(p => p.id === id);
    const detail = (cs.details||[]).find(d => d.id === id);
    const name = part ? part.name : (detail ? detail.name : 'Деталь');
    let bp = id.startsWith('detail_')
      ? ((cs._detailPrices && cs._detailPrices[id]) ? cs._detailPrices[id] : {...DETAIL_BASE})
      : BASE_PRICES[id];
    if (!bp) return;
    const partTier = (cs._partTiers && cs._partTiers[id]) || cs.tier;
    const add = TIER_ADD[partTier] || 0;
    const pr = { s:bp.s, rc:bp.rc>0?bp.rc+add:0, z:bp.z>0?bp.z+add:0, p1:bp.p1, p2:bp.p2, r2:bp.r2, r1:bp.r1 };
    if (colorSurchargePDF > 0) { if (pr.p1>0) pr.p1+=colorSurchargePDF; if (pr.p2>0) pr.p2+=colorSurchargePDF; }
    const st = cs.svcState[id] || {};
    if (!SVC_KEYS.some(k => st[k])) return;
    let rowTotal = 0;
    SVC_KEYS.forEach(k => { if (st[k] && pr[k]>0) rowTotal += pr[k]; });
    hasRows = true;
    const cells = SVC_KEYS.map((k,i) => {
      const v = pr[k];
      const active = st[k] && v > 0;
      return `<td>${active ? v.toLocaleString('ru')+'\u202f₽' : '—'}</td>`;
    }).join('');
    rows += `<tr class="data-row"><td class="name-cell">${escHtml(name)}</td>${cells}<td class="sum-cell">${rowTotal.toLocaleString('ru')}\u202f₽</td></tr>`;
  });

  // ── Итог деталей ────────────────────────────────────────────
  let grandServices = 0;
  allIds.forEach(id => {
    let bp = id.startsWith('detail_')
      ? ((cs._detailPrices && cs._detailPrices[id]) ? cs._detailPrices[id] : {...DETAIL_BASE})
      : BASE_PRICES[id];
    if (!bp) return;
    const partTier = (cs._partTiers && cs._partTiers[id]) || cs.tier;
    const add = TIER_ADD[partTier] || 0;
    const pr = { s:bp.s, rc:bp.rc>0?bp.rc+add:0, z:bp.z>0?bp.z+add:0, p1:bp.p1, p2:bp.p2, r2:bp.r2, r1:bp.r1 };
    if (colorSurchargePDF > 0) { if (pr.p1>0) pr.p1+=colorSurchargePDF; if (pr.p2>0) pr.p2+=colorSurchargePDF; }
    const st = cs.svcState[id] || {};
    SVC_KEYS.forEach(k => { if (st[k] && pr[k]>0) grandServices += pr[k]; });
  });

  // ── Запчасти ─────────────────────────────────────────────────
  const spares = (cs.spareParts||[]).filter(r => r.name || r.price);
  const spSum = spares.reduce((s,r) => s + (parseFloat(String(r.price||'').replace(/\s/g,''))||0), 0);
  let spareRows = '';
  if (spares.length > 0) {
    spareRows = spares.map(r => `<tr class="data-row"><td class="name-cell">${escHtml(r.name||'—')}</td><td class="sum-cell" style="color:#c47f00;">${r.price?(parseFloat(String(r.price||'').replace(/\s/g,''))||0).toLocaleString('ru')+'\u202f₽':'—'}</td></tr>`).join('');
  }

  // ── Затраты мастера ──────────────────────────────────────────
  let repairParts=0, paintCost=0;
  let cntSU=0, cntRC=0, cntZ=0;

  const cSU  = _settings.repairCostPerSU ?? 4000;
  const cRC  = _settings.repairCostPerRC ?? 4000;
  const cZ   = _settings.repairCostPerZ  ?? 4000;
  const paintCoeff = _settings.paintCoeff2layer || 1.3;
  const PAINT_LARGE = ['kap','kry','bag'];
  allIds.forEach(id => {
    const st = cs.svcState[id] || {};
    if (st.r1 || st.r2) repairParts++;
    if (st.s)  cntSU++;
    if (st.rc) cntRC++;
    if (st.z)  cntZ++;
    const paintBase = PAINT_LARGE.includes(id) ? 4500 : 3000;
    if (st.p2) paintCost += Math.round(paintBase * paintCoeff);
    else if (st.p1) paintCost += paintBase;
  });
  const extraRepair = cs.extraRepair || 0;
  const extraPaint  = cs.extraPaint  || 0;
  const repairMaterialCost = repairParts*cRep + cntSU*cSU + cntRC*cRC + cntZ*cZ;
  const totalRepairCost = repairMaterialCost + extraRepair;
  const totalPaintCost  = paintCost + extraPaint;
  const _spPct = (_settings.sparePartsPercent ?? 5) / 100;
  const otherCost = Math.round(spSum * _spPct);
  const totalCosts = totalRepairCost + totalPaintCost + otherCost;

  // Итог с затратами
  const grandTotal = grandServices + spSum + totalCosts;

  // ── Уровень ──────────────────────────────────────────────────
  const tierLabel = TIER_LABELS[cs.tier] || 'Лайт';
  const daysTotal = (cs.daysBody||0) + (cs.daysPaint||0);

  // ── QR-код ───────────────────────────────────────────────────
  // Base64 QR-кода из загруженного изображения (VK ссылка)
  const QR_DATA_URL = 'data:image/jpeg;base64,/9j/'; // placeholder — используем URL вместо base64

  const html = `<!DOCTYPE html>

// ── Навигация страниц ───────────────────────────────────────
function showPage(page) {
  const layout = document.getElementById('main-layout');
  const archivePage = document.getElementById('archive-page');
  const settingsPage = document.getElementById('settings-page');
  const navCalc = document.getElementById('nav-calc');
  const navArch = document.getElementById('nav-archive');
  const navSet  = document.getElementById('nav-settings');

  // Скрываем всё
  layout.style.display = 'none';
  archivePage.classList.remove('active');
  settingsPage.classList.remove('active');
  [navCalc, navArch, navSet].forEach(b => b && b.classList.remove('active'));

  if (page === 'archive') {
    archivePage.classList.add('active');
    navArch && navArch.classList.add('active');
    renderArchive();
  } else if (page === 'settings') {
    settingsPage.classList.add('active');
    navSet && navSet.classList.add('active');
    renderSettingsPage();
  } else {
    layout.style.display = 'grid';
    navCalc && navCalc.classList.add('active');
  }
}

// ── История визитов ─────────────────────────────────────────
function buildVisitHistory(c) {
  const visits = c.visits || [];
  if (visits.length === 0) return '';

  const rows = [...visits].reverse().map((v, i) => {
    const realIdx = visits.length - 1 - i;
    const num = visits.length - i;
    const badge = v.status === 'done'
      ? `<span class="visit-badge vb-done">✅ Отработан</span>`
      : `<span class="visit-badge vb-archive">📁 Архив</span>`;
    const parts = getVisitPartNames(v);
    const sumStr = v.total > 0 ? v.total.toLocaleString('ru') + ' ₽' : '—';
    return `
      <div class="visit-item" data-visit-idx="${realIdx}">
        <div class="visit-item-top">
          <span class="visit-num">#${num}</span>
          <span class="visit-date">${v.date}</span>
          <span class="visit-tier-label">${TIER_LABELS[v.tier] || 'Лайт'}</span>
          <span class="visit-sum ${v.status==='done'?'done':''}">${sumStr}</span>
          ${badge}
        </div>
        <div class="visit-desc">${escHtml(parts)}</div>
      </div>`;
  }).join('');

  return `
    <div class="visit-history">
      <div class="visit-history-header">
        <span class="visit-history-title">История визитов (${visits.length})</span>
      </div>
      <div class="visit-list">${rows}</div>
    </div>`;
}

function getVisitPartNames(visit) {
  if (!visit.calcState) return '—';
  const cs = visit.calcState;
  const names = [];
  cs.selected.forEach(id => {
    const p = PARTS.find(p => p.id === id);
    if (p) names.push(p.name);
  });
  (cs.details||[]).forEach(d => names.push(d.name));
  return names.length > 0 ? names.slice(0,3).join(', ') + (names.length > 3 ? ` +${names.length-3}` : '') : 'Нет деталей';
}

// ── Архивировать текущий визит ───────────────────────────────
function archiveVisit(clientId, isDone) {
  const c = clients.find(c => c.id === clientId);
  if (!c) return;

  const cs = c.calcState;
  // Используем полную сумму (итог с затратами) — она рассчитывается в updateSummary
  const fullTotal = cs._grandTotal ?? calcClientTotal(c);
  const allIds = [...(cs.selected||[]), ...(cs.details||[]).map(d => d.id)];

  if (allIds.length === 0 && !confirm('Нет выбранных деталей. Всё равно архивировать?')) return;
  if (!confirm(`Сохранить как "${isDone ? 'Отработан' : 'В архиве'}"?\nПосле этого расчёт очистится и можно начать новый.`)) return;

  // Сохраняем снапшот
  if (!c.visits) c.visits = [];
  c.visits.push({
    date: new Date().toLocaleDateString('ru-RU'),
    ts: Date.now(),
    status: isDone ? 'done' : 'archive',
    tier: cs.tier,
    total: fullTotal,
    calcState: JSON.parse(JSON.stringify(cs)),
  });

  // Сбрасываем текущий расчёт
  c.calcState = defaultCalcState();
  c.status = isDone ? 'done' : 'archive';
  saveClients();
  renderClientList();

  // После архивирования — закрываем рабочую область и показываем пустой экран
  activeClientId = null;
  document.getElementById('work-empty').style.display = 'flex';
  const ws = document.getElementById('client-workspace');
  ws.style.display = 'none';
  ws.innerHTML = '';
}

// ── Новый визит ──────────────────────────────────────────────
function newVisit(clientId) {
  const c = clients.find(c => c.id === clientId);
  if (!c) return;

  const cs = c.calcState;
  const allIds = [...(cs.selected||[]), ...(cs.details||[]).map(d => d.id)];

  if (allIds.length > 0) {
    if (!confirm('Текущий расчёт будет сохранён в архив и начнётся новый визит. Продолжить?')) return;
    // Автоархивируем текущий
    if (!c.visits) c.visits = [];
    c.visits.push({
      date: new Date().toLocaleDateString('ru-RU'),
      ts: Date.now(),
      status: 'archive',
      tier: cs.tier,
      total: cs._grandTotal ?? calcClientTotal(c),
      calcState: JSON.parse(JSON.stringify(cs)),
    });
  }

  // Сбрасываем расчёт
  c.calcState = defaultCalcState();
  c.status = 'new';
  saveClients();
  renderClientList();
  openClient(clientId);
}
