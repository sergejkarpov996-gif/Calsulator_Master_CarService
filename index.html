function markVisitDone(clientId, visitIdx) {
  const c = clients.find(c => c.id === clientId);
  if (!c || !c.visits || !c.visits[visitIdx]) return;
  c.visits[visitIdx].status = 'done';
  saveClients();
  openClient(clientId);
}

// ── Восстановить визит из архива в активный расчёт ───────────
function restoreVisit(clientId, visitIdx) {
  const c = clients.find(c => c.id === clientId);
  if (!c || !c.visits || !c.visits[visitIdx]) return;
  const v = c.visits[visitIdx];

  // Проверяем что текущий расчёт пуст — иначе спрашиваем
  const cs = c.calcState;
  const currentIds = [...(cs.selected||[]), ...(cs.details||[]).map(d => d.id)];
  if (currentIds.length > 0) {
    if (!confirm('Текущий незавершённый расчёт будет заменён данными из архивного визита. Продолжить?')) return;
  }

  // Восстанавливаем calcState из архивного визита
  const restoredState = JSON.parse(JSON.stringify(v.calcState || defaultCalcState()));

  // Синхронизируем глобальный тир с per-part тирами
  const _rPartTiers = Object.values(restoredState._partTiers || {});
  if (_rPartTiers.length > 0) {
    const _rAllSame = _rPartTiers.every(t => t === _rPartTiers[0]);
    if (_rAllSame) {
      // Все детали одного тира — глобальный тир совпадает
      restoredState.tier = _rPartTiers[0];
    }
    // Если разные — глобальный тир = минимальный среди использованных
    // (для корректного отображения глобальной кнопки)
    // _partTiers СОХРАНЯЕМ как есть — buildPartTableHTML использует их напрямую
  } else {
    // _partTiers пуст — используем сохранённый tier как fallback
    restoredState.tier = v.tier || restoredState.tier || 'light';
  }

  // Дополняем svcState для деталей которых нет в архивном state
  PARTS.forEach(p => {
    if (!restoredState.svcState[p.id]) {
      restoredState.svcState[p.id] = {};
      SVC_KEYS.forEach(k => restoredState.svcState[p.id][k] = false);
    }
  });

  c.calcState = restoredState;
  c.status = 'new';

  // Удаляем визит из архива
  c.visits.splice(visitIdx, 1);

  saveClients();

  // Переходим на вкладку «Расчёты» и открываем клиента
  showPage('calc');
  openClient(clientId);

  // Глобальная кнопка тира: подсвечиваем только если все детали одного уровня
  const _finalPartTiers = Object.values(restoredState._partTiers || {});
  document.querySelectorAll('.tier-btn:not(.pt-tier-btn)').forEach(b => b.classList.remove('active'));
  if (_finalPartTiers.length === 0 || _finalPartTiers.every(t => t === _finalPartTiers[0])) {
    const _activeTier = _finalPartTiers[0] || restoredState.tier;
    document.querySelector(`.tier-btn[data-tier="${_activeTier}"]:not(.pt-tier-btn)`)?.classList.add('active');
  }
  // Если разные тиры — ни одна глобальная кнопка не активна (это правильно)
}

function deleteVisit(clientId, visitIdx) {
  const c = clients.find(c => c.id === clientId);
  if (!c || !c.visits) return;
  c.visits.splice(visitIdx, 1);
  saveClients();
  // Обновляем архив если он открыт
  const archivePage = document.getElementById('archive-page');
  if (archivePage && archivePage.classList.contains('active')) {
    renderArchive();
  } else {
    openClient(clientId);
  }
}

// ── PDF для архивного визита ──────────────────────────────────
function printVisitPDF(clientId, visitIdx) {
  const c = clients.find(c => c.id === clientId);
  if (!c || !c.visits || !c.visits[visitIdx]) return;
  const savedActive = activeClientId;
  const savedState = c.calcState;
  c.calcState = c.visits[visitIdx].calcState;
  activeClientId = clientId;
  printPDF();
  c.calcState = savedState;
  activeClientId = savedActive;
}

// ── Архив страница ───────────────────────────────────────────
function renderArchive() {
  const searchName   = (document.getElementById('arch-search-name')?.value  || '').toLowerCase();
  const searchPhone  = (document.getElementById('arch-search-phone')?.value || '').toLowerCase();
  const searchCar    = (document.getElementById('arch-search-car')?.value   || '').toLowerCase();
  const statusFilter = document.getElementById('arch-status')?.value || '';

  const container = document.getElementById('archive-rows');
  if (!container) return;

  // Группируем по клиентам
  const clientsWithVisits = clients
    .map(c => {
      const visits = (c.visits||[])
        .map((v, idx) => ({ v, idx }))
        .filter(({ v }) => {
          if (statusFilter && v.status !== statusFilter) return false;
          return true;
        });
      return { c, visits };
    })
    .filter(({ c, visits }) => {
      if (visits.length === 0) return false;
      if (searchName  && !c.name.toLowerCase().includes(searchName))  return false;
      if (searchPhone && !(c.phone||'').toLowerCase().includes(searchPhone)) return false;
      if (searchCar   && ![(c.car||''),(c.plate||''),(c.vin||'')].join(' ').toLowerCase().includes(searchCar)) return false;
      return true;
    });

  // Сортируем клиентов по дате последнего визита (новые сверху)
  clientsWithVisits.sort((a, b) => {
    const aTs = Math.max(...a.visits.map(x => x.v.ts || 0));
    const bTs = Math.max(...b.visits.map(x => x.v.ts || 0));
    return bTs - aTs;
  });

  if (clientsWithVisits.length === 0) {
    container.innerHTML = '<div class="archive-empty">Архив пуст</div>';
    return;
  }

  container.innerHTML = clientsWithVisits.map(({ c, visits }, ci) => {
    const totalSum = visits.reduce((s, { v }) => s + (v.total || 0), 0);
    const lastVisit = visits.slice().sort((a, b) => (b.v.ts||0) - (a.v.ts||0))[0];
    const lastDate = lastVisit ? lastVisit.v.date : '—';
    const allDone = visits.every(({ v }) => v.status === 'done');

    // Строки визитов
    const visitRows = visits
      .slice()
      .sort((a, b) => (b.v.ts||0) - (a.v.ts||0))
      .map(({ v, idx }) => {
        const isDone = v.status === 'done';
        const badge = isDone
          ? `<span style="font-family:Oswald,sans-serif;font-size:12px;font-weight:700;padding:4px 10px;background:#1a3a1a;color:#4caf50;text-transform:uppercase;">✅ Отработан</span>`
          : `<span style="font-family:Oswald,sans-serif;font-size:12px;font-weight:700;padding:4px 10px;background:#1a1a3a;color:#7986cb;text-transform:uppercase;">📁 В архиве</span>`;
        const sum = v.total > 0 ? v.total.toLocaleString('ru') + ' ₽' : '—';
        const parts = getVisitPartNames(v);
        // Реальный микс уровней по деталям визита
        const _vcs = v.calcState || {};
        const _vPartIds = [...(_vcs.selected||[]), ...(_vcs.details||[]).map(d => d.id)];
        const _vTierColorMap = {light:'#4caf50',standard:'#ffa726',premium:'#d20124'};
        const _vTierOrder = ['light','standard','premium'];
        let tierLabel;
        if (_vPartIds.length === 0) {
          tierLabel = TIER_LABELS[v.tier] || 'Лайт';
        } else {
          const _vUsedTiers = [...new Set(_vPartIds.map(id => (_vcs._partTiers&&_vcs._partTiers[id])||_vcs.tier||'light'))];
          if (_vUsedTiers.length === 1) {
            const _tc = _vTierColorMap[_vUsedTiers[0]]||'#888';
            tierLabel = `<span style="font-family:Oswald,sans-serif;font-size:12px;font-weight:700;padding:3px 8px;background:${_tc}22;color:${_tc};">${TIER_LABELS[_vUsedTiers[0]]||_vUsedTiers[0]}</span>`;
          } else {
            tierLabel = _vUsedTiers
              .sort((a,b)=>_vTierOrder.indexOf(a)-_vTierOrder.indexOf(b))
              .map(t=>{const tc=_vTierColorMap[t]||'#888';return `<span style="font-family:Oswald,sans-serif;font-size:11px;font-weight:700;padding:2px 6px;background:${tc}22;color:${tc};">${TIER_LABELS[t]||t}</span>`;})
              .join(' ');
          }
        }
        return `
          <div class="arch-visit-row" data-client-id="${ci}" data-visit-idx="${idx}" style="display:flex;align-items:center;gap:12px;padding:14px 20px 14px 56px;border-bottom:1px solid #1a1a1a;cursor:pointer;transition:background .15s;" onmouseenter="this.style.background='#111'" onmouseleave="this.style.background=''">
            <span style="font-family:Oswald,sans-serif;color:#555;font-size:15px;min-width:80px;">${v.date}</span>
            <span style="font-family:Oswald,sans-serif;color:#888;font-size:14px;min-width:80px;">${tierLabel}</span>
            <span style="color:#666;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">⚙️ ${escHtml(parts)}</span>
            ${badge}
            <span style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;color:${isDone?'#4caf50':'#d20124'};min-width:100px;text-align:right;">${sum}</span>
            <button class="arch-restore-btn" data-client-id="${ci}" data-visit-idx="${idx}" style="background:#1a1a2e;color:#7986cb;border:1px solid #2a2a5a;font-family:Oswald,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;padding:7px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;">↩ В работу</button>
            <button class="arch-pdf-btn" data-client-id="${ci}" data-visit-idx="${idx}" style="background:#d20124;color:#fff;border:none;font-family:Oswald,sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;padding:7px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;">🖨️ PDF</button>
          </div>`;
      }).join('');

    return `
      <div class="arch-client-block" style="border:1px solid #1e1e1e;border-left:3px solid ${allDone?'#2e7d32':'#283593'};margin-bottom:6px;border-radius:2px;overflow:hidden;">
        <!-- Шапка клиента — кликабельна -->
        <div class="arch-client-header" data-ci="${ci}" style="display:flex;align-items:center;gap:14px;padding:16px 20px;background:#111;cursor:pointer;transition:background .15s;user-select:none;">
          <div style="font-family:Oswald,sans-serif;font-size:22px;font-weight:700;color:#333;min-width:32px;text-align:center;">${ci+1}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:Oswald,sans-serif;font-size:22px;font-weight:700;color:#ddd;">${escHtml(c.name)}</div>
            <div style="font-size:14px;color:#666;font-family:PT Sans,sans-serif;display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;">
              ${c.phone?`<span>📞 ${escHtml(c.phone)}</span>`:''}
              ${c.car?`<span>🚗 ${escHtml(c.car)}</span>`:''}
              ${c.plate?`<span>🔢 ${escHtml(c.plate)}</span>`:''}
              <span>📅 последний: ${lastDate}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:Oswald,sans-serif;font-size:13px;color:#666;text-transform:uppercase;letter-spacing:1px;">Визитов: ${visits.length}</div>
            <div style="font-family:Oswald,sans-serif;font-size:24px;font-weight:700;color:${allDone?'#4caf50':'#d20124'};">${totalSum > 0 ? totalSum.toLocaleString('ru') + ' ₽' : '—'}</div>
          </div>
          <div class="arch-chevron" style="color:#444;font-size:18px;flex-shrink:0;transition:transform .2s;">▼</div>
        </div>
        <!-- Список визитов — скрыт по умолчанию -->
        <div class="arch-visits-body" style="display:none;">
          <div style="display:flex;align-items:center;gap:12px;padding:8px 20px 8px 56px;background:#0a0a0a;border-bottom:1px solid #1a1a1a;">
            <span style="font-family:Oswald,sans-serif;color:#555;font-size:12px;text-transform:uppercase;min-width:80px;">Дата</span>
            <span style="font-family:Oswald,sans-serif;color:#555;font-size:12px;text-transform:uppercase;min-width:80px;">Уровень</span>
            <span style="font-family:Oswald,sans-serif;color:#555;font-size:12px;text-transform:uppercase;flex:1;">Детали</span>
            <span style="font-family:Oswald,sans-serif;color:#555;font-size:12px;text-transform:uppercase;min-width:100px;text-align:right;">Сумма</span>
            <span style="width:60px;"></span>
          </div>
          ${visitRows}
        </div>
      </div>`;
  }).join('');

  // Сохраняем snapshot для обработчиков
  const snapshot = clientsWithVisits;

  // Аккордеон — шапка клиента
  container.querySelectorAll('.arch-client-header').forEach(header => {
    header.addEventListener('click', () => {
      const block = header.closest('.arch-client-block');
      const body = block.querySelector('.arch-visits-body');
      const chevron = header.querySelector('.arch-chevron');
      const isOpen = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : 'block';
      chevron.style.transform = isOpen ? '' : 'rotate(180deg)';
      header.style.background = isOpen ? '' : '#161616';
    });
  });

  // Клик на строку визита — открывает оверлей
  container.querySelectorAll('.arch-visit-row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('.arch-pdf-btn')) return; // PDF кнопка — отдельно
      const ci = parseInt(row.dataset.clientId, 10);
      const idx = parseInt(row.dataset.visitIdx, 10);
      const { c } = snapshot[ci];
      openVisitDetail(c.id, idx);
    });
  });

  // PDF кнопки
  container.querySelectorAll('.arch-pdf-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const ci = parseInt(btn.dataset.clientId, 10);
      const idx = parseInt(btn.dataset.visitIdx, 10);
      const { c } = snapshot[ci];
      printVisitPDF(c.id, idx);
    });
  });

  // Кнопки «В работу» (восстановить из архива)
  container.querySelectorAll('.arch-restore-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const ci = parseInt(btn.dataset.clientId, 10);
      const idx = parseInt(btn.dataset.visitIdx, 10);
      const { c } = snapshot[ci];
      restoreVisit(c.id, idx);
    });
  });
}

    </div>

    <div class="settings-row">
      <div class="settings-label">
        Коэффициент двухслойной покраски
        <small>Умножается на базовую стоимость краски. Обычно 1.3</small>
      </div>
      <input class="settings-input" type="number" id="st-paint-coeff" min="1" step="0.05"
        value="${s.paintCoeff2layer ?? 1.3}" style="width:100px;">
      <span class="settings-unit">×</span>
    </div>

    <div class="settings-row">
      <div class="settings-label">
        Стоимость краски (1 слой)
        <small>Базовая себестоимость краски за одну деталь в 1 слой</small>
      </div>
      <input class="settings-input" type="number" id="st-paint-cost1" min="0" step="100"
        value="${s.paintCost1layer ?? 3000}">
      <span class="settings-unit">₽</span>
    </div>

    <div class="settings-row">
      <div class="settings-label">
        % прочих затрат от суммы запчастей
        <small>Прочие затраты = X% от суммы запчастей из таблицы</small>
      </div>
      <input class="settings-input" type="number" id="st-spare-pct" min="0" max="100" step="0.5"
        value="${s.sparePartsPercent ?? 5}" style="width:80px;">
      <span class="settings-unit">%</span>
    </div>



    <div class="settings-section-title" style="margin-top:24px;">Таблица цен</div>
    <p style="font-size:12px;color:#444;font-family:'PT Sans',sans-serif;margin-bottom:12px;">
      Оставьте поле пустым чтобы использовать базовую цену. Изменения применяются сразу после сохранения.
    </p>

    <div style="overflow-x:auto;">
      <div class="settings-prices-grid" id="st-prices-grid">
        <div class="sp-head" style="text-align:left;padding-left:12px;">Деталь</div>
        ${SVC_COL_LABELS.map(l => `<div class="sp-head">${l}</div>`).join('')}
        ${priceRows}
      </div>
    </div>

    <div style="display:flex;gap:0;flex-wrap:wrap;">
      <button class="settings-save-btn" id="st-save-btn">💾 Сохранить настройки</button>
      <button class="settings-reset-btn" id="st-reset-btn">↺ Сбросить к базовым</button>
    </div>

    <div class="settings-section-title" style="margin-top:32px;">Расходные материалы по деталям</div>
    <p style="font-size:12px;color:#444;font-family:'PT Sans',sans-serif;margin-bottom:12px;">
      Индивидуальная стоимость расходных материалов для каждой детали. Пустое поле = глобальное значение. <b style="color:#555;">0</b> = отключить.
    </p>

    <!-- Глобальные значения — скрытые инпуты для collectAndSave -->
    <input type="hidden" id="st-cost-repair" value="${s.repairCostPerRepair ?? 4000}">
    <input type="hidden" id="st-cost-repair-v" value="${s.repairCostPerRepair ?? 4000}">
    <input type="hidden" id="st-cost-su"     value="${s.repairCostPerSU ?? 0}">
    <input type="hidden" id="st-cost-su-v"   value="${s.repairCostPerSU ?? 0}">
    <input type="hidden" id="st-cost-rc"     value="${s.repairCostPerRC ?? 0}">
    <input type="hidden" id="st-cost-rc-v"   value="${s.repairCostPerRC ?? 0}">
    <input type="hidden" id="st-cost-z"      value="${s.repairCostPerZ ?? 0}">
    <input type="hidden" id="st-cost-z-v"    value="${s.repairCostPerZ ?? 0}">

    <div style="overflow-x:auto;">
      <div class="settings-prices-grid" style="grid-template-columns:160px repeat(4,1fr);" id="st-mat-grid">
        <div class="sp-head" style="text-align:left;padding-left:12px;">Деталь</div>
        <div class="sp-head">Рем &lt;50% / &gt;50%</div>
        <div class="sp-head">С/У</div>
        <div class="sp-head">Р/С</div>
        <div class="sp-head">Замена</div>
        ${PARTS_META.map(g => {
          const primaryId = g.ids[0];
          const mc = (s.materialCosts && s.materialCosts[primaryId]) || {};
          const mcKeys = ['r','s','rc','z'];
          const globals = [s.repairCostPerRepair??4000, s.repairCostPerSU??0, s.repairCostPerRC??0, s.repairCostPerZ??0];
          const cells = mcKeys.map((k, ki) => {
            const val = mc[k] !== undefined ? mc[k] : '';
            const isZero = val === 0 || val === '0';
            return `<div class="sp-cell" style="${isZero?'background:#0a0a0a;':''}">
              <input type="number" min="0" step="100" class="st-mat-inp"
                data-ids="${g.ids.join(',')}" data-mc="${k}"
                value="${val}" placeholder="${globals[ki]}"
                oninput="this.parentElement.style.background=this.value==='0'?'#0a0a0a':'';this.style.color=this.value==='0'?'#333':'#fff';"
                style="width:100%;background:transparent;border:none;color:${isZero?'#333':'#fff'};font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-align:right;padding:6px 8px;outline:none;">
            </div>`;
          }).join('');
          const idHint = g.ids.length > 1 ? `<small style="color:#444;font-size:10px;display:block;">${g.ids.join(', ')}</small>` : '';
          return `<div class="sp-name">${g.name}${idHint}</div>${cells}`;
        }).join('')}
      </div>
    </div>

    <div style="display:flex;gap:0;flex-wrap:wrap;margin-top:16px;">
      <button class="settings-save-btn" id="st-save-btn2">💾 Сохранить настройки</button>
    </div>
  `;

  // Сохранить
  document.getElementById('st-save-btn').addEventListener('click', () => {
    collectAndSave();
    const btn = document.getElementById('st-save-btn');
    btn.textContent = '✓ Сохранено!';
    btn.style.background = '#1a8a3c';
    setTimeout(() => { btn.textContent = '💾 Сохранить настройки'; btn.style.background = ''; }, 2000);
  });

  // Функция сбора materialCosts
  function collectAndSave() {
    const ns = { ...loadSettings() };
    ns.colorSurcharge    = Math.max(0, parseInt(document.getElementById('st-color-surcharge').value) || 0);
    ns.paintCoeff2layer  = Math.max(1, parseFloat(document.getElementById('st-paint-coeff').value) || 1.3);
    ns.paintCost1layer   = Math.max(0, parseInt(document.getElementById('st-paint-cost1').value) || 0);
    ns.sparePartsPercent = Math.max(0, Math.min(100, parseFloat(document.getElementById('st-spare-pct').value) || 5));
    // Читаем глобальные расходники из видимых инпутов -v (или hidden как fallback)
    const gv = id => {
      const el = document.getElementById(id + '-v') || document.getElementById(id);
      return Math.max(0, parseInt(el ? el.value : '0') || 0);
    };
    ns.repairCostPerRepair = gv('st-cost-repair');
    ns.repairCostPerSU     = gv('st-cost-su');
    ns.repairCostPerRC     = gv('st-cost-rc');
    ns.repairCostPerZ      = gv('st-cost-z');
    // Цены деталей
    ns.prices = {};
    document.querySelectorAll('#st-prices-grid input[data-group]').forEach(inp => {
      if (inp.disabled || inp.value.trim() === '') return;
      const key = inp.dataset.key;
      const val = parseInt(inp.value);
      if (isNaN(val)) return;
      inp.dataset.group.split(',').forEach(partId => {
        partId = partId.trim();
        if (!ns.prices[partId]) ns.prices[partId] = {};
        ns.prices[partId][key] = val;
      });
    });
    // Расходные материалы по деталям
    ns.materialCosts = {};
    document.querySelectorAll('.st-mat-inp').forEach(inp => {
      if (inp.value.trim() === '') return;
      const val = parseInt(inp.value);
      if (isNaN(val)) return;
      const mcKey = inp.dataset.mc;
      inp.dataset.ids.split(',').forEach(partId => {
        partId = partId.trim();
        if (!ns.materialCosts[partId]) ns.materialCosts[partId] = {};
        ns.materialCosts[partId][mcKey] = val;
      });
    });
    saveSettings(ns);
    if (activeClientId) openClient(activeClientId);
    return ns;
  }

  // Кнопка 2 (внизу)
  const btn2 = document.getElementById('st-save-btn2');
  if (btn2) btn2.addEventListener('click', () => {
    collectAndSave();
    btn2.textContent = '✓ Сохранено!';
    btn2.style.background = '#1a8a3c';
    setTimeout(() => { btn2.textContent = '💾 Сохранить настройки'; btn2.style.background = ''; }, 2000);
  });

  // Сбросить
  document.getElementById('st-reset-btn').addEventListener('click', () => {
    if (!confirm('Сбросить все настройки цен к стандартным?')) return;
    resetSettings();
    if (activeClientId) openClient(activeClientId);
    renderSettingsPage();
  });

  // Подсветка нуля в таблице цен
  function initZeroTracking() {
    document.querySelectorAll('#st-prices-grid .sp-cell input').forEach(inp => {
      const applyZero = () => {
        const isZero = inp.value.trim() === '0';
        inp.dataset.zero = isZero ? '1' : '0';
        inp.style.color = isZero ? '#333' : '';
        inp.style.background = isZero ? '#0a0a0a' : '';
        inp.style.borderColor = isZero ? '#1a1a1a' : '';
        inp.parentElement.style.background = isZero ? '#0a0a0a' : '';
      };
      applyZero();
      inp.addEventListener('input', applyZero);
    });
  }
  initZeroTracking();
}

renderClientList();

// ── Глобальный обработчик кликов по записям визитов ──────────
document.addEventListener('click', function(e) {
  const overlay = document.getElementById('visit-overlay');
  if (overlay && overlay.contains(e.target)) return;
  const visitItem = e.target.closest('.visit-item[data-visit-idx]');
  if (visitItem && activeClientId) {
    const idx = parseInt(visitItem.dataset.visitIdx, 10);
    if (!isNaN(idx)) openVisitDetail(activeClientId, idx);
  }
});

// ── Глобальный делегированный обработчик для кнопок уровня сервиса ──
document.addEventListener('click', function(e) {
  // Кнопка уровня для конкретной детали (.pt-tier-btn)
  const ptBtn = e.target.closest('.pt-tier-btn[data-id][data-tier]');
  if (ptBtn) {
    const clientId = activeClientId;
    if (!clientId) return;
    const c = clients.find(c => c.id === clientId);
    if (!c) return;
    const cs = c.calcState;
    const partId = ptBtn.dataset.id;
    const tier = ptBtn.dataset.tier;
    cs._partTiers = cs._partTiers || {};
    cs._partTiers[partId] = tier;
    const part = PARTS.find(p => p.id === partId);
    const detail = (cs.details||[]).find(d => d.id === partId);
    const name = part ? part.name : (detail ? detail.name : 'Деталь');
    const tableDiv = document.getElementById('table_' + partId);
    if (!tableDiv) return;
    const savedTier = cs.tier;
    cs.tier = tier;
    tableDiv.innerHTML = part ? buildPartTableHTML(partId, name, cs) : buildDetailTableHTML(partId, name, cs);
    cs.tier = savedTier;
    attachPartRowEvents(c, partId);
    updateRowTotal(partId, cs, tier);
    updateSummary(c);
    // Обновляем глобальные кнопки
    const allIds = [...(cs.selected||[]), ...(cs.details||[]).map(d => d.id)];
    const tiers = allIds.map(id => (cs._partTiers && cs._partTiers[id]) || cs.tier);
    const allSame = tiers.every(t => t === tiers[0]);
    document.querySelectorAll('.tier-btn:not(.pt-tier-btn)').forEach(b => b.classList.remove('active'));
    if (allSame) document.querySelector(`.tier-btn[data-tier="${tiers[0]}"]:not(.pt-tier-btn)`)?.classList.add('active');
    saveClients();
    return;
  }

  // Глобальная кнопка уровня (.tier-btn но не .pt-tier-btn)
  const tierBtn = e.target.closest('.tier-btn:not(.pt-tier-btn)[data-tier]');
  if (tierBtn) {
    const clientId = activeClientId;
    if (!clientId) return;
    const c = clients.find(c => c.id === clientId);
    if (!c) return;
    const cs = c.calcState;
    const newTier = tierBtn.dataset.tier;
    cs.tier = newTier;
    cs._partTiers = {};
    document.querySelectorAll('.tier-btn:not(.pt-tier-btn)').forEach(b => b.classList.remove('active'));
    tierBtn.classList.add('active');
    rebuildAllTables(c);
    updateSummary(c);
    saveClients();
  }

  // Кнопки корректировки затрат +/-
  const adjBtn = e.target.closest('.cost-adj-btn[data-type]');
  if (adjBtn) {
    if (!activeClientId) return;
    const c = clients.find(c => c.id === activeClientId);
    if (!c) return;
    const cs = c.calcState;
    const type = adjBtn.dataset.type;
    if (adjBtn.dataset.action === 'reset') {
      // Сброс корректировки в 0
      if (type === 'repair') cs.extraRepair = 0;
      if (type === 'paint')  cs.extraPaint  = 0;
    } else {
      const delta = parseInt(adjBtn.dataset.delta, 10);
      if (type === 'repair') cs.extraRepair = (cs.extraRepair || 0) + delta;
      if (type === 'paint')  cs.extraPaint  = (cs.extraPaint  || 0) + delta;
    }
    updateSummary(c);
    saveClients();
  }
});
</script>
</body>
</html>
